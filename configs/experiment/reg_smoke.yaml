# @package _global_

task: regression
model:
  feature_group_size: 1
runtime:
  output_dir: outputs/reg_smoke
  device: cpu
  mixed_precision: "no"
  num_workers: 0
  grad_clip: 1.0
  grad_accum_steps: 1
  eval_every: 5
  val_batches: 4
schedule:
  stages:
    - name: stage1
      steps: 10
      lr_max: 8.0e-4
    - name: stage2
      steps: 5
      lr_max: 1.0e-4
    - name: stage3
      steps: 3
      lr_max: 2.0e-5
data:
  train_row_cap: 96
  test_row_cap: 48
logging:
  run_name: reg-smoke
