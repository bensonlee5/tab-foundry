- order: 2
  delta_ref: delta_training_linear_decay
  status: completed
  rationale: Test whether grouped tokens mainly need a longer decayed prior-training
    schedule rather than a different structure.
  hypothesis: Plain linear decay may recover some late ROC retention on the grouped-token
    surface, but it may still underperform if the early schedule is too abrupt for
    the fixed grouped-token trunk.
  anchor_delta: Keep the grouped-token model, data, and preprocessing surfaces fixed
    and replace the `training_default` anchor recipe with single-stage linear decay.
  model:
    stage: grouped_tokens
    stage_label: delta_architecture_screen_grouped_tokens
    module_overrides:
      allow_test_self_attention: true
      column_encoder: none
      context_encoder: none
      feature_encoder: shared
      head: small_class
      post_encoder_norm: none
      post_stack_norm: none
      row_pool: target_column
      table_block_residual_scale: none
      table_block_style: prenorm
      target_conditioner: label_token
      tokenizer: shifted_grouped
  data:
    surface_label: anchor_manifest_default
  preprocessing:
    surface_label: runtime_default
  training:
    surface_label: prior_linear_decay
    overrides:
      apply_schedule: true
      optimizer:
        min_lr: 0.0004
      schedule:
        stages:
        - name: stage1
          steps: 2500
          lr_max: 0.004
          lr_schedule: linear
          warmup_ratio: 0.0
  parameter_adequacy_plan:
  - Interpret against the constant-LR anchor on both ROC and post-warmup stability
    diagnostics.
  - Keep optimizer, model, data, and preprocessing fixed for the first pass.
  run_id: sd_grouped_token_stability_probe_v1_02_delta_training_linear_decay_v1
  followup_run_ids: []
  decision: defer
  interpretation_status: completed
  confounders: []
  next_action: Keep this row as a ROC-oriented tradeoff reference only; prefer the
    warmup-decay grouped-token surface before any benchmark-facing replay or later
    row-first architecture work.
  notes:
  - Canonical rerun registered as `sd_grouped_token_stability_probe_v1_02_delta_training_linear_decay_v1`.
  - Canonical benchmark comparison recorded against the locked sweep anchor; interpret
