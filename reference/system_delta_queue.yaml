  dimension_family: training
  family: screening
  binary_applicable: true
  description: Re-screen the large-anchor batch32 replay surface with a short activation-first
    diagnostic run.
  rationale: Reconfirm the inherited batch32 replay activation-drift profile on a
    short diagnostic budget before reading any new stabilization change.
  hypothesis: The batch32 replay control will still show steadily rising upper-block
    activation norms over 1000 steps, reproducing the parent-sweep failure mode on
    a cheaper screen.
  upstream_delta: Not applicable; this is a repo-local control screen for the stack-scale
    follow-up.
  anchor_delta: Keep the large-anchor batch32 replay surface fixed, but replace the
    full benchmarked run with a short 1000-step train-only screen.
  entangled_legacy_stage: none
  expected_effect: Reconfirm the control upper-block activation drift on the short
    screen budget before reading any new stabilization change.
  adequacy_knobs:
  - training.overrides.runtime.max_steps
  - training.overrides.schedule.stages[0].steps
  - training.overrides.schedule.stages[0].warmup_ratio
  parameter_adequacy_policy:
    default_plan:
    - Treat this row as the short-screen control, not as a benchmark-facing replacement
      for the registered anchor.
    - Compare the same upper-block screen diagnostics against rows 2-4 before choosing
      any combined full-budget row.
    default_negative_decision: defer
    reject_requires:
    - isolated_change
    - adequacy_plan_complete
    - clearly_worse_without_offsetting_benefit
  applicability_guards: []
  model:
    stage: nano_exact
    stage_label: dpnb_cuda_stack_scale_control
    d_col: 128
    d_icl: 512
    input_normalization: train_zscore_clip
    module_overrides:
      table_block_style: prenorm
      allow_test_self_attention: false
      row_pool: row_cls
    tfrow_n_heads: 8
    tfrow_n_layers: 3
    tfrow_cls_tokens: 2
    tfrow_norm: layernorm
    tficl_n_heads: 8
    tficl_n_layers: 12
    head_hidden_dim: 1024
  dynamic_model_overrides: null
  data:
    surface_label: anchor_manifest_default
  preprocessing:
    surface_label: runtime_default
  training:
    surface_label: prior_linear_warmup_decay
    prior_dump_non_finite_policy: skip
    prior_dump_batch_size: 32
    prior_dump_lr_scale_rule: none
    prior_dump_batch_reference_size: 32
    overrides:
      apply_schedule: true
      optimizer:
        min_lr: 0.0004
      runtime:
        grad_clip: 1.0
        max_steps: 1000
        trace_activations: true
      schedule:
        stages:
        - name: prior_dump
          steps: 1000
          lr_max: 0.004
          lr_schedule: linear
          warmup_ratio: 0.05
  parameter_adequacy_plan:
  - Treat this row as the short-screen control, not as a benchmark-facing replacement
