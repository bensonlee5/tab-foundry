schema: tab-foundry-system-delta-sweep-queue-v1
sweep_id: cuda_stack_scale_followup
rows:
  - order: 1
    delta_ref: dpnb_cuda_stack_scale_control
    status: ready
    rationale: Reconfirm the inherited batch32 replay activation-drift profile on a short diagnostic budget before reading any new stabilization change.
    hypothesis: The batch32 replay control will still show steadily rising upper-block activation norms over 1000 steps, reproducing the parent-sweep failure mode on a cheaper screen.
    anchor_delta: Keep the large-anchor batch32 replay surface fixed, but replace the full benchmarked run with a short 1000-step train-only screen.
    model:
      stage: nano_exact
      stage_label: dpnb_cuda_stack_scale_control
      d_col: 128
      d_icl: 512
      input_normalization: train_zscore_clip
      module_overrides:
        table_block_style: prenorm
        allow_test_self_attention: false
        row_pool: row_cls
      tfrow_n_heads: 8
      tfrow_n_layers: 3
      tfrow_cls_tokens: 2
      tfrow_norm: layernorm
      tficl_n_heads: 8
      tficl_n_layers: 12
      head_hidden_dim: 1024
    data:
      surface_label: anchor_manifest_default
    preprocessing:
      surface_label: runtime_default
    training:
      surface_label: prior_linear_warmup_decay
      prior_dump_non_finite_policy: skip
      prior_dump_batch_size: 32
      prior_dump_lr_scale_rule: none
      prior_dump_batch_reference_size: 32
      overrides:
        apply_schedule: true
        optimizer:
          min_lr: 0.0004
        runtime:
          grad_clip: 1.0
          max_steps: 1000
          trace_activations: true
        schedule:
          stages:
            - name: prior_dump
              steps: 1000
              lr_max: 0.004
              lr_schedule: linear
              warmup_ratio: 0.05
    parameter_adequacy_plan:
      - Treat this row as the short-screen control, not as a benchmark-facing replacement for the registered anchor.
      - Compare the same upper-block screen diagnostics against rows 2-4 before choosing any combined full-budget row.
    execution_policy: screen_only
    run_id: null
    followup_run_ids: []
    decision: null
    interpretation_status: pending
    confounders: []
    next_action: Run this short-screen control first, then compare the two post-stack norm candidates before deciding on the combined benchmark row.
    notes:
      - If upper-block means remain clearly upward after warmup, treat the control as reproduced even if train loss looks superficially acceptable.
  - order: 2
    delta_ref: dpnb_cuda_stack_scale_poststack_rms
    status: ready
    rationale: Test the cheapest downstream stabilization path first by adding only a post-stack RMSNorm on the same short-screen control surface.
    hypothesis: RMSNorm after the full block stack may reduce the exported residual scale enough to beat the control on upper-block final-window mean, even if it does not fully address in-stack growth.
    anchor_delta: Keep the large-anchor batch32 replay screen fixed and add `model.module_overrides.post_stack_norm=rmsnorm` after the full prenorm table-block stack.
    model:
      stage: nano_exact
      stage_label: dpnb_cuda_stack_scale_poststack_rms
      d_col: 128
      d_icl: 512
      input_normalization: train_zscore_clip
      module_overrides:
        table_block_style: prenorm
        allow_test_self_attention: false
        row_pool: row_cls
        post_stack_norm: rmsnorm
      tfrow_n_heads: 8
      tfrow_n_layers: 3
      tfrow_cls_tokens: 2
      tfrow_norm: layernorm
      tficl_n_heads: 8
      tficl_n_layers: 12
      head_hidden_dim: 1024
    data:
      surface_label: anchor_manifest_default
    preprocessing:
      surface_label: runtime_default
    training:
      surface_label: prior_linear_warmup_decay
      prior_dump_non_finite_policy: skip
      prior_dump_batch_size: 32
      prior_dump_lr_scale_rule: none
      prior_dump_batch_reference_size: 32
      overrides:
        apply_schedule: true
        optimizer:
          min_lr: 0.0004
        runtime:
          grad_clip: 1.0
          max_steps: 1000
          trace_activations: true
        schedule:
          stages:
            - name: prior_dump
              steps: 1000
              lr_max: 0.004
              lr_schedule: linear
              warmup_ratio: 0.05
    parameter_adequacy_plan:
      - Compare directly against the matching LayerNorm row on the same short-screen surface.
      - Use upper-block final-window mean as the first discriminator and keep train loss secondary.
    execution_policy: screen_only
    run_id: null
    followup_run_ids: []
    decision: null
    interpretation_status: pending
    confounders: []
    next_action: Run after the short-screen control and compare directly against the LayerNorm variant before carrying one norm into a full benchmark row.
    notes: []
  - order: 3
    delta_ref: dpnb_cuda_stack_scale_poststack_ln
    status: ready
    rationale: Complete the norm-family comparison on the same short-screen surface so the combined row can choose a downstream norm mechanically instead of by inspection.
    hypothesis: LayerNorm may outperform RMSNorm on upper-block boundedness and clip rate on this large-anchor bridge surface, even though both act only after the block stack.
    anchor_delta: Keep the large-anchor batch32 replay screen fixed and add `model.module_overrides.post_stack_norm=layernorm` after the full prenorm table-block stack.
