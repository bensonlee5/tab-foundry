comparison_policy: anchor_only
upstream_reference:
  name: nanoTabPFN
  model_source: https://github.com/automl/nanoTabPFN/blob/main/model.py
anchor_surface:
  notes:
  - This follow-up is anchored on the promoted `dpnb_row_cls_cls2_linear_warmup_decay`
    bridge surface rather than the older post-layernorm canonical anchor.
  - Row 1 localized that bridge baseline on this machine as `sd_input_norm_followup_01_dpnb_input_norm_anchor_replay_v1`,
    so later rows now compare against a real same-machine anchor.
  - The queue isolates input normalization first, then adds bounded batch-size sidecars
    with explicit sqrt LR scaling around the reference batch size of 32.
  - RMSNorm is intentionally out of scope here; the architecture stays fixed at the
    promoted prenorm plus row-cls bridge surface.
  dimension_table:
  - dimension: bridge architecture
    upstream: Old bridge rows established that prenorm plus row-cls cls2 can train
      cleanly with linear warmup decay.
    anchor: Keep `nano_exact`, `table_block_style=prenorm`, `row_pool=row_cls`, `tfrow_cls_tokens=2`,
      and `post_encoder_norm=none` fixed.
    interpretation: Changes in this sweep should be attributed to preprocessing or
      batch-size effects, not to a reopened architecture axis.
  - dimension: input normalization
    upstream: The bridge baseline still uses `train_zscore_clip`.
    anchor: Compare plain unclipped z-score, winsorize+zscore, zscore+tanh, and robust+tanh
      against the clipped bridge default.
    interpretation: The main question is whether hard clipping remains necessary once
      the bridge baseline is stabilized.
  - dimension: batch-size scaling
    upstream: Exact-prior training previously treated batch size as a hidden function
      argument rather than a tracked surface knob.
    anchor: Add sidecars at batch sizes 16 and 64 with sqrt LR scaling relative to
      the reference batch size of 32.
    interpretation: Batch-size rows are interaction probes, not a new mainline sweep
      family.
