repos:

- repo: local
  hooks:
  - id: version-bump-guard
    name: version bump guard
    entry: ./.venv/bin/python scripts/audit/check_version_bump.py
    language: system
    always_run: true
    pass_filenames: false
  - id: ruff-check
    name: ruff check
    entry: ./.venv/bin/ruff check src tests scripts
    language: system
    types_or: [python, pyi]
    files: ^(src/|tests/|scripts/)
    pass_filenames: false
  - id: mypy
    name: mypy
    entry: ./.venv/bin/python -m mypy src
    language: system
    types_or: [python, pyi]
    files: ^src/
    pass_filenames: false
  - id: pytest
    name: pytest
    entry: ./.venv/bin/python -m pytest -n auto --maxprocesses 8 tests
    language: system
    types_or: [python, pyi]
    files: ^(src/|tests/)
    pass_filenames: false
  - id: mdformat
    name: mdformat
    entry: ./.venv/bin/mdformat AGENTS.md README.md docs reference CHANGELOG.md
    language: system
    types: [markdown]
    files: ^(AGENTS\.md|README\.md|docs/|reference/|CHANGELOG\.md$)
    pass_filenames: false
