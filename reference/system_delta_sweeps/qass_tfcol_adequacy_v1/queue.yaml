schema: tab-foundry-system-delta-sweep-queue-v1
sweep_id: qass_tfcol_adequacy_v1
rows:
- order: 1
  delta_ref: delta_qass_context_tfcol_inducing64_v1
  status: ready
  rationale: Evaluate whether the calibration-winning `qass_context` line is carrying
    more TFCol inducing capacity than this no-missing medium bundle actually needs.
  hypothesis: If the default TFCol inducing set is overbuilt, halving it to 64 should
    preserve the log-loss/Brier gain of `delta_qass_context_v3` while recovering
    ROC or training time.
  anchor_delta: Starting from the completed `delta_qass_context_v3` anchor, reduce
    only `tfcol_n_inducing` from 128 to 64 and keep the rest of the QASS row-first
    surface fixed.
  model:
    stage: qass_context
    stage_label: delta_qass_context_tfcol_inducing64_v1
    tfcol_n_inducing: 64
  data:
    surface_label: anchor_manifest_default
  preprocessing:
    surface_label: runtime_default
  training:
    surface_label: prior_linear_warmup_decay
    prior_dump_non_finite_policy: skip
    overrides:
      apply_schedule: true
      optimizer:
        name: schedulefree_adamw
        require_requested: true
        weight_decay: 0.0
        betas:
        - 0.9
        - 0.999
        min_lr: 0.0004
        muon_per_parameter_lr: false
      runtime:
        max_steps: 2500
        eval_every: 25
        checkpoint_every: 25
        trace_activations: false
      schedule:
        stages:
        - name: stage1
          steps: 2500
          lr_max: 0.004
          lr_schedule: linear
          warmup_ratio: 0.05
  parameter_adequacy_plan:
  - Compare directly against the completed `delta_qass_context_v3` anchor and keep
    the calibration-first objective fixed.
  - Promote only if the row keeps the calibration win over `delta_qass_no_column_v3`
    and improves either ROC or training time versus the anchor.
  run_id: null
  followup_run_ids: []
  decision: null
  interpretation_status: pending
  confounders: []
  next_action: Run first and compare directly against the completed `delta_qass_context_v3`
    anchor to see whether a smaller inducing set preserves calibration while recovering
    ROC or runtime.
  notes:
  - Treat this as a pure inducing-capacity adequacy row; do not reopen the broader
    TFCol-versus-no-TFCol attribution question on this bundle.
  - If this row wins, validate it next against `delta_qass_no_column_v3` on `src/tab_foundry/bench/nanotabpfn_openml_binary_large_no_missing_v1.json`.
  - Execution must use the same benchmark bundle, control baseline, and reuse signature
    as the v3 anchor so only TFCol inducing capacity changes.
