schema: tab-foundry-system-delta-queue-v1
generated_from_sweep_id: cuda_capacity_pilot
catalog_path: reference/system_delta_catalog.yaml
canonical_sweep_path: reference/system_delta_sweeps/cuda_capacity_pilot/sweep.yaml
canonical_queue_path: reference/system_delta_sweeps/cuda_capacity_pilot/queue.yaml
canonical_matrix_path: reference/system_delta_sweeps/cuda_capacity_pilot/matrix.md
sweep_id: cuda_capacity_pilot
parent_sweep_id: input_norm_followup
sweep_status: active
complexity_level: binary_md
anchor_run_id: sd_input_norm_followup_07_dpnb_input_norm_anchor_replay_batch64_sqrt_v2
benchmark_bundle_path: src/tab_foundry/bench/nanotabpfn_openml_binary_medium_v1.json
control_baseline_id: cls_benchmark_linear_v2
comparison_policy: anchor_only
upstream_reference:
  name: nanoTabPFN
  model_source: https://github.com/automl/nanoTabPFN/blob/main/model.py
anchor_surface:
  notes:
  - This pilot now anchors on the promoted batch64 sqrt-scaled clipped bridge winner
    from `input_norm_followup` so the CUDA capacity rows inherit the current preferred
    systems surface.
  - Row 1 establishes the first large CUDA-sized bridge baseline; rows 2 and 3 probe
    width and depth separately rather than fitting a mixed-family scaling curve.
  - '`input_norm_none_followup` completed on the same systems surface and did not
    justify removing explicit clipping, so input normalization stays fixed at `train_zscore_clip`
    on this branch.'
  - Training-budget changes are intentionally excluded from this sweep and move to
    the draft `cuda_budget_followup` scaffold.
  dimension_table:
  - dimension: bridge architecture
    upstream: The registered anchor remains the promoted prenorm plus row-cls bridge
      recipe from the completed follow-up.
    anchor: Keep `nano_exact`, `table_block_style=prenorm`, `row_pool=row_cls`, `tfrow_cls_tokens=2`,
      and `post_encoder_norm=none` fixed.
    interpretation: Capacity rows should be read as model-size probes on the bridge
      surface, not as reopened module-selection experiments.
  - dimension: model capacity
    upstream: The promoted anchor run keeps the compact bridge width while moving
      to the batch64 sqrt-scaled training surface.
    anchor: Row 1 moves to the large CUDA base `d_col=128`, `d_icl=512`, `tficl_n_heads=8`,
      `tficl_n_layers=12`, `head_hidden_dim=1024`.
    interpretation: Rows 2 and 3 should be compared against row 1 first so width and
      depth evidence stays attributable.
  - dimension: input normalization
    upstream: The completed normalization follow-up promoted the clipped batch64 row,
      and the no-normalization follow-up underperformed on the same systems surface.
    anchor: Keep `train_zscore_clip` fixed across this pilot because `input_norm_none_followup`
      underperformed and did not justify removing explicit clipping.
    interpretation: Any movement in this sweep should not be attributed to preprocessing
      changes.
  - dimension: training recipe
    upstream: The registered anchor already uses the promoted `prior_linear_warmup_decay`
      recipe with batch size 64 and sqrt LR scaling.
    anchor: Keep `prior_linear_warmup_decay`, `prior_dump_batch_size=64`, `prior_dump_lr_scale_rule=sqrt`,
      `prior_dump_batch_reference_size=32`, and `2500` steps fixed.
    interpretation: Longer-budget adequacy checks belong in `cuda_budget_followup`,
      not in this capacity readout.
anchor_context:
  run_id: sd_input_norm_followup_07_dpnb_input_norm_anchor_replay_batch64_sqrt_v2
  experiment: cls_benchmark_staged_prior
  config_profile: cls_benchmark_staged_prior
  model:
    arch: tabfoundry_staged
    stage: nano_exact
    benchmark_profile: dpnb_input_norm_anchor_replay_batch64_sqrt
    stage_label: dpnb_input_norm_anchor_replay_batch64_sqrt
    module_selection:
      allow_test_self_attention: false
      column_encoder: none
      context_encoder: none
      feature_encoder: nano
      head: binary_direct
      post_encoder_norm: none
      row_pool: row_cls
      table_block_style: prenorm
      target_conditioner: mean_padded_linear
      tokenizer: scalar_per_feature
  surface_labels:
    data: anchor_manifest_default
    model: dpnb_input_norm_anchor_replay_batch64_sqrt
    preprocessing: runtime_default
    training: prior_linear_warmup_decay
rows:
- order: 1
  delta_id: dpnb_cuda_large_anchor
  status: ready
  dimension_family: model
  family: size_scaling
  binary_applicable: true
  description: Establish the large CUDA-sized bridge baseline on the stabilized prenorm
    plus row-cls recipe.
  rationale: Establish a large CUDA-sized bridge baseline before asking whether width
    or depth matters more.
  hypothesis: The promoted bridge recipe should benefit from a larger exact-prior
    trunk even without changing the optimizer or preprocessing family.
  upstream_delta: Not applicable; this is a repo-local capacity expansion relative
    to the promoted batch64 sqrt-scaled bridge anchor.
  anchor_delta: Reuses the registered bridge anchor run but promotes the row itself
    to the large CUDA base with the same bridge modules and training recipe.
  entangled_legacy_stage: none
  expected_effect: A larger exact-prior trunk may improve quality if the promoted
    bridge surface is still capacity-limited at the current budget.
  adequacy_knobs:
  - model.d_icl
  - model.tficl_n_heads
  - model.tficl_n_layers
  - model.head_hidden_dim
  parameter_adequacy_policy:
    default_plan:
    - Run this row first and treat it as the large-model comparator for the rest of
      the capacity pilot.
    - Compare against the promoted batch64 sqrt-scaled anchor on the task-family primary
      metric first, then supporting diagnostics and training-time delta.
    default_negative_decision: defer
    reject_requires:
    - isolated_change
    - adequacy_plan_complete
    - clearly_worse_without_offsetting_benefit
  applicability_guards: []
  model:
    stage: nano_exact
    stage_label: dpnb_cuda_large_anchor
    d_col: 128
    d_icl: 512
    input_normalization: train_zscore_clip
    module_overrides:
      table_block_style: prenorm
      allow_test_self_attention: false
      row_pool: row_cls
    tfrow_n_heads: 8
    tfrow_n_layers: 3
    tfrow_cls_tokens: 2
    tfrow_norm: layernorm
    tficl_n_heads: 8
    tficl_n_layers: 12
    head_hidden_dim: 1024
  data:
    surface_label: anchor_manifest_default
  preprocessing:
    surface_label: runtime_default
  training:
    surface_label: prior_linear_warmup_decay
    prior_dump_non_finite_policy: skip
    prior_dump_batch_size: 64
    prior_dump_lr_scale_rule: sqrt
    prior_dump_batch_reference_size: 32
    overrides:
      apply_schedule: true
      optimizer:
        min_lr: 0.0004
      runtime:
        grad_clip: 1.0
        max_steps: 2500
        trace_activations: true
      schedule:
        stages:
        - name: prior_dump
          steps: 2500
          lr_max: 0.004
          lr_schedule: linear
          warmup_ratio: 0.05
  parameter_adequacy_plan:
  - Run this row first and treat it as the local large-model comparator for the rest
    of the pilot.
  - Rank by the task-family primary final metric first, then supporting diagnostics
    and final training-time delta versus the promoted anchor.
  - Use activation and clipping telemetry to explain wins or losses, not to override
    benchmark quality.
  run_id: null
  followup_run_ids: []
  decision: null
  interpretation_status: pending
  confounders: []
  next_action: Run this row first to establish the large CUDA bridge baseline before
    evaluating width or depth probes.
  notes:
  - This row is the baseline for the pilot even though the sweep anchor remains the
    promoted compact batch64 bridge run.
  benchmark_metrics: null
- order: 2
  delta_id: dpnb_cuda_large_width_x2
  status: ready
  dimension_family: model
  family: size_scaling
  binary_applicable: true
  description: Double the large-anchor width-related capacity while keeping bridge
    modules and depth fixed.
  rationale: Test whether a substantially wider bridge trunk beats the large anchor
    without also changing depth.
  hypothesis: Increasing representational width at fixed depth may recover more quality
    than adding more layers on this benchmark bundle.
  upstream_delta: Not applicable; this is a repo-local width probe on the large bridge
    baseline.
  anchor_delta: Changes only the width-related capacity knobs relative to row 1 while
    leaving bridge modules, normalization, and schedule fixed.
  entangled_legacy_stage: none
  expected_effect: More width may improve representation quality if the large anchor
    remains bottlenecked on hidden size rather than depth.
  adequacy_knobs:
  - model.d_col
  - model.d_icl
  - model.head_hidden_dim
  parameter_adequacy_policy:
    default_plan:
    - Compare directly against the large-anchor row before reading the depth probe.
    - Prefer width only if its benchmark gain survives the training-time cost.
    default_negative_decision: defer
    reject_requires:
    - isolated_change
    - adequacy_plan_complete
    - clearly_worse_without_offsetting_benefit
  applicability_guards: []
  model:
    stage: nano_exact
    stage_label: dpnb_cuda_large_width_x2
    d_col: 256
    d_icl: 1024
    input_normalization: train_zscore_clip
    module_overrides:
      table_block_style: prenorm
      allow_test_self_attention: false
      row_pool: row_cls
    tfrow_n_heads: 8
    tfrow_n_layers: 3
    tfrow_cls_tokens: 2
    tfrow_norm: layernorm
    tficl_n_heads: 8
    tficl_n_layers: 12
    head_hidden_dim: 2048
  data:
    surface_label: anchor_manifest_default
  preprocessing:
    surface_label: runtime_default
  training:
    surface_label: prior_linear_warmup_decay
    prior_dump_non_finite_policy: skip
    prior_dump_batch_size: 64
    prior_dump_lr_scale_rule: sqrt
    prior_dump_batch_reference_size: 32
    overrides:
      apply_schedule: true
      optimizer:
        min_lr: 0.0004
      runtime:
        grad_clip: 1.0
        max_steps: 2500
        trace_activations: true
      schedule:
        stages:
        - name: prior_dump
          steps: 2500
          lr_max: 0.004
          lr_schedule: linear
          warmup_ratio: 0.05
  parameter_adequacy_plan:
  - Compare directly against row 1 before reading row 3.
  - Treat this as a sibling model-capacity probe rather than a new long-budget family.
  - Prefer width only if the benchmark win survives the training-time increase.
  run_id: null
  followup_run_ids: []
  decision: null
  interpretation_status: pending
  confounders: []
  next_action: Compare this row against the large anchor and decide whether width
    deserves a dedicated second sweep.
  notes:
  - This row deliberately leaves `tficl_n_layers=12` fixed so the width effect stays
    attributable.
  benchmark_metrics: null
- order: 3
  delta_id: dpnb_cuda_large_depth_plus4
  status: ready
  dimension_family: model
  family: size_scaling
  binary_applicable: true
  description: Add four ICL transformer layers on top of the large CUDA bridge anchor
    while keeping width fixed.
  rationale: Test whether modestly deeper ICL processing helps more than width once
    the large bridge base is established.
  hypothesis: Extra transformer depth may improve benchmark quality if the large anchor
    is still under-expressive at fixed width.
  upstream_delta: Not applicable; this is a repo-local depth probe on the large bridge
    baseline.
  anchor_delta: Changes only `tficl_n_layers` relative to row 1 while keeping width,
    normalization, and training budget fixed.
  entangled_legacy_stage: none
  expected_effect: More depth may improve benchmark quality if the large anchor needs
    extra iterative processing more than extra width.
  adequacy_knobs:
  - model.tficl_n_layers
  parameter_adequacy_policy:
    default_plan:
    - Compare directly against the large-anchor row after the width probe is available.
    - Treat this as the depth sibling of the width row rather than a budget change.
    default_negative_decision: defer
    reject_requires:
    - isolated_change
    - adequacy_plan_complete
    - clearly_worse_without_offsetting_benefit
  applicability_guards: []
  model:
    stage: nano_exact
    stage_label: dpnb_cuda_large_depth_plus4
    d_col: 128
    d_icl: 512
    input_normalization: train_zscore_clip
    module_overrides:
      table_block_style: prenorm
      allow_test_self_attention: false
      row_pool: row_cls
    tfrow_n_heads: 8
    tfrow_n_layers: 3
    tfrow_cls_tokens: 2
    tfrow_norm: layernorm
    tficl_n_heads: 8
    tficl_n_layers: 16
    head_hidden_dim: 1024
  data:
    surface_label: anchor_manifest_default
  preprocessing:
    surface_label: runtime_default
  training:
    surface_label: prior_linear_warmup_decay
    prior_dump_non_finite_policy: skip
    prior_dump_batch_size: 64
    prior_dump_lr_scale_rule: sqrt
    prior_dump_batch_reference_size: 32
    overrides:
      apply_schedule: true
      optimizer:
        min_lr: 0.0004
      runtime:
        grad_clip: 1.0
        max_steps: 2500
        trace_activations: true
      schedule:
        stages:
        - name: prior_dump
          steps: 2500
          lr_max: 0.004
          lr_schedule: linear
          warmup_ratio: 0.05
  parameter_adequacy_plan:
  - Compare directly against row 1 after the width probe is available.
  - Treat this as the depth sibling of row 2, not as evidence for longer training.
  - Open the budget follow-up only after rows 1-3 establish the best architecture
    of this pilot.
  run_id: null
  followup_run_ids: []
  decision: null
  interpretation_status: pending
  confounders: []
  next_action: Compare this row against the large anchor and then choose whether width,
    depth, or the large anchor itself should seed the budget follow-up.
  notes:
  - This row deliberately keeps the large-anchor width fixed so the depth effect stays
    attributable.
  benchmark_metrics: null
