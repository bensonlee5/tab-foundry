schema: tab-foundry-system-delta-sweep-queue-v1
sweep_id: stability_followup
rows:
- order: 1
  delta_ref: dpnb_baseline_cosine_warmup_2500
  status: ready
  rationale: >-
    Establish the clean 2500-step cosine-warmup baseline on the `delta_prenorm_block`
    bridge surface before comparing any schedule or optimizer changes.
  hypothesis: >-
    The reprised delta-prenorm baseline should remain finite, show a low clipped-step fraction,
    and provide the correct comparator for the wider calibration queue.
  anchor_delta: >-
    Re-anchors `stability_followup` on the old `delta_prenorm_block` contract and keeps a
    2500-step cosine warmup recipe with trace activations enabled.
  parameter_adequacy_plan:
  - Use this row as the baseline comparator for every later row in the sweep.
  - Report benchmark ROC, best-to-final drift, clipped-step fraction, encoder/head gradient ratio windows, and activation windows.
  - Do not treat this row as a new benchmark ceiling; it is the hybrid-diagnostic baseline for future prenorm work.
  model:
    stage: nano_exact
    stage_label: dpnb_baseline_cosine_warmup_2500
    module_overrides:
      table_block_style: prenorm
      allow_test_self_attention: false
  data:
    surface_label: anchor_manifest_default
  preprocessing:
    surface_label: runtime_default
  training:
    surface_label: prior_cosine_warmup
    prior_dump_non_finite_policy: skip
    overrides:
      apply_schedule: true
      runtime:
        grad_clip: 1.0
        max_steps: 2500
        trace_activations: true
      schedule:
        stages:
        - name: prior_dump
          steps: 2500
          lr_max: 0.004
          lr_schedule: cosine
          warmup_ratio: 0.05
  run_id: null
  followup_run_ids: []
  decision: null
  interpretation_status: pending
  confounders: []
  next_action: >-
    Run this row first and keep it as the calibration baseline for rows 2-12.
  notes:
  - This row replaces the blocked 10000-step horizon probe.

- order: 2
  delta_ref: dpnb_linear_decay_lr4e3
  status: ready
  rationale: >-
    Test whether plain linear decay reduces prenorm drift without any warmup.
  hypothesis: >-
    Decay may improve checkpoint retention, but it can also reopen early clipped steps on the prenorm hybrid-diagnostic surface.
  anchor_delta: >-
    Keeps the bridge model fixed while switching to single-stage linear decay at lr_max=0.004 with no warmup.
  parameter_adequacy_plan:
  - Compare best ROC first, final ROC second, and drift third against row 1.
  - Treat clipped-step fraction and module balance as diagnostics for warmup necessity.
  - If this row regresses early, prefer the warmup-decay family rather than concluding decay is bad globally.
  model:
    stage: nano_exact
    stage_label: dpnb_linear_decay_lr4e3
    module_overrides:
      table_block_style: prenorm
      allow_test_self_attention: false
  data:
    surface_label: anchor_manifest_default
  preprocessing:
    surface_label: runtime_default
  training:
    surface_label: prior_linear_decay
    prior_dump_non_finite_policy: skip
    overrides:
      apply_schedule: true
      optimizer:
        min_lr: 0.0004
      runtime:
        grad_clip: 1.0
        max_steps: 2500
        trace_activations: true
      schedule:
        stages:
        - name: prior_dump
          steps: 2500
          lr_max: 0.004
          lr_schedule: linear
          warmup_ratio: 0.0
  run_id: null
  followup_run_ids: []
  decision: null
  interpretation_status: pending
  confounders: []
  next_action: >-
    Compare directly against row 1 and row 3 to decide whether warmup is still necessary under decay.
  notes: []

