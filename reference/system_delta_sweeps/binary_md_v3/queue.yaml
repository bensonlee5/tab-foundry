schema: tab-foundry-system-delta-sweep-queue-v1
sweep_id: binary_md_v3
rows:
- order: 1
  delta_ref: delta_global_rmsnorm
  status: ready
  rationale: >-
    Test bias removal (baked into QASS and shared encoder layers) combined with
    global RMSNorm on the promoted shared+LayerNorm anchor.
  hypothesis: >-
    RMSNorm may improve optimization stability, and bias removal provides mild
    regularization by eliminating redundant parameters behind pre-norm layers.
  anchor_delta: >-
    Changes the global norm family from LayerNorm to RMSNorm (norm_type and
    tfrow_norm) while keeping the shared feature encoder, post-encoder LayerNorm,
    nano-postnorm block style, and all other anchor surfaces fixed.
  model:
    stage_label: delta_global_rmsnorm
    norm_type: rmsnorm
    tfrow_norm: rmsnorm
    module_overrides:
      feature_encoder: shared
      post_encoder_norm: layernorm
  data:
    surface_label: anchor_manifest_default
  preprocessing:
    surface_label: runtime_default
  training:
    surface_label: prior_constant_lr
    overrides: {}
  parameter_adequacy_plan:
    - Compare best/final ROC AUC and training stability against the v3 anchor.
    - Distinguish early-step stabilization from true end-of-run quality improvements.
    - Note the bias-removal confound — this run tests both changes simultaneously.
  run_id: null
  followup_run_ids: []
  decision: null
  interpretation_status: pending
  confounders:
    - Bias removal is baked into the code; cannot isolate RMSNorm from bias removal.
  next_action: Train on the locked medium binary surface and benchmark against the v3 anchor.
  notes:
    - The v1 RMSNorm run (sd_binary_md_v1_10_delta_global_rmsnorm_v1) scored 0.7601 best ROC AUC on the nano-only anchor.
