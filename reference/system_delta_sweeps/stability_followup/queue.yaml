  parameter_adequacy_plan:
  - Compare locally against row 3 on both benchmark quality and clipped-step fraction.
  - Do not promote solely on cleaner telemetry if benchmark quality regresses materially.
  - Use the result to bound the LR search before larger-model prenorm work.
