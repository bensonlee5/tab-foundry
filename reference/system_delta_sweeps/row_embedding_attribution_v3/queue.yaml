schema: tab-foundry-system-delta-sweep-queue-v1
sweep_id: row_embedding_attribution_v3
rows:
- order: 1
  delta_ref: delta_qass_no_column_v3
  status: ready
  rationale: Evaluate whether QASS itself belongs on the promoted row-first line
    after v2 showed the no-context row-embedding surface was the clean positive result.
  hypothesis: If QASS is the actual source of the row-first improvement, `qass_context`
    with the column encoder disabled should beat the v2 no-context row-embedding anchor
    directly.
  anchor_delta: Starting from the v2 no-context row-embedding anchor, enable only
    the QASS context path while keeping the column encoder off so QASS is isolated
    from TFCol.
  model:
    stage: qass_context
    stage_label: delta_qass_no_column_v3
    module_overrides:
      column_encoder: none
  data:
    surface_label: anchor_manifest_default
  preprocessing:
    surface_label: runtime_default
  training:
    surface_label: prior_linear_warmup_decay
    prior_dump_non_finite_policy: skip
    overrides:
      apply_schedule: true
      optimizer:
        name: schedulefree_adamw
        require_requested: true
        weight_decay: 0.0
        betas:
        - 0.9
        - 0.999
        min_lr: 0.0004
        muon_per_parameter_lr: false
      runtime:
        max_steps: 2500
        eval_every: 25
        checkpoint_every: 25
        trace_activations: false
      schedule:
        stages:
        - name: stage1
          steps: 2500
          lr_max: 0.004
          lr_schedule: linear
          warmup_ratio: 0.05
  parameter_adequacy_plan:
  - Compare directly against the v2 no-context row-embedding anchor before reading
    any TFCol result.
  - Treat this as the QASS-only corner of the row-first follow-up factorization.
  run_id: null
  followup_run_ids: []
  decision: null
  interpretation_status: pending
  confounders: []
  next_action: Run first and compare directly against the v2 no-context row-embedding
    anchor before attributing any TFCol effect.
  notes:
  - Execution must use the same benchmark bundle, control baseline, and reuse signature
    as v2 so QASS is the only modeled change.
