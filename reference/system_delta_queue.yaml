schema: tab-foundry-system-delta-queue-v1
generated_from_sweep_id: binary_md_v1
catalog_path: reference/system_delta_catalog.yaml
canonical_sweep_path: reference/system_delta_sweeps/binary_md_v1/sweep.yaml
canonical_queue_path: reference/system_delta_sweeps/binary_md_v1/queue.yaml
canonical_matrix_path: reference/system_delta_sweeps/binary_md_v1/matrix.md
sweep_id: binary_md_v1
parent_sweep_id: null
sweep_status: active
complexity_level: binary_md
anchor_run_id: 01_nano_exact_md_prior_parity_fix_binary_medium_v1
benchmark_bundle_path: src/tab_foundry/bench/nanotabpfn_openml_binary_medium_v1.json
control_baseline_id: cls_benchmark_linear_v2
comparison_policy: anchor_only
upstream_reference:
  name: nanoTabPFN
  model_source: https://github.com/automl/nanoTabPFN/blob/main/model.py
anchor_surface:
  notes:
  - The locked anchor is the current canonical benchmark-facing staged run on the
    10-task medium binary bundle.
  - Relative to upstream nanoTabPFN, the anchor keeps the nano-exact active path but
    runs inside the general tabfoundry_staged shell.
  - Data and preprocessing remain part of the comparison surface and must stay fixed
    unless the queue row declares that exact dimension.
  dimension_table:
  - dimension: feature encoder
    upstream: Scalar feature linear encoder with internal train/test z-score+clip
      handling.
    anchor: Same nano feature encoder path.
    interpretation: Functional parity should be close; remaining differences come
      from the staged wrapper and metadata surface, not the active encoder math.
  - dimension: target conditioning
    upstream: Mean-padded linear target encoder.
    anchor: Same mean-padded linear target conditioner.
    interpretation: The anchor intentionally preserves the upstream label-conditioning
      mechanism.
  - dimension: cell transformer block
    upstream: Post-norm nanoTabPFN block with feature attention then row attention.
    anchor: Same nano post-norm block.
    interpretation: This is the strongest structural anchor to upstream parity.
  - dimension: row readout
    upstream: Target-column readout from the final cell tensor.
    anchor: Same target-column row pool.
    interpretation: Later row-pool experiments should be interpreted as explicit departures
      from upstream, not minor tuning.
  - dimension: tokenizer
    upstream: One scalar token per feature.
    anchor: Same scalar-per-feature tokenizer.
    interpretation: Grouped-token changes must be isolated from later row/context
      changes.
  - dimension: context encoder
    upstream: None on the direct binary path.
    anchor: None on the direct binary path.
    interpretation: Any context encoder row changes both compute graph depth and target-conditioning
      semantics and therefore needs its own adequacy commentary.
  - dimension: training data surface
    upstream: OpenML notebook tasks only for benchmarking; no repo-local prior-training
      manifest contract.
    anchor: Repo-local manifest-driven prior-training surface at data/manifests/default.parquet.
    interpretation: Data-source changes are first-class sweep rows, not background
      assumptions.
  - dimension: preprocessing
    upstream: Notebook preprocessing inside the benchmark helper.
    anchor: Runtime support-set preprocessing with mean imputation and train-only
      label remap/filter semantics.
    interpretation: Preprocessing changes can alter the effective task definition
      and must be tracked explicitly.
  - dimension: training recipe
    upstream: No repo-local prior-dump training-surface contract.
    anchor: Exact-prior training surface label `prior_constant_lr`.
    interpretation: Optimizer and schedule changes are first-class sweep rows, not
      silent background recipe assumptions.
anchor_context:
  run_id: 01_nano_exact_md_prior_parity_fix_binary_medium_v1
  model:
    arch: tabfoundry_staged
    stage: nano_exact
    stage_label: nano_exact
    module_selection:
      feature_encoder: nano
      target_conditioner: mean_padded_linear
      tokenizer: scalar_per_feature
      column_encoder: none
      row_pool: target_column
      context_encoder: none
      head: binary_direct
      table_block_style: nano_postnorm
      allow_test_self_attention: false
  surface_labels:
    model: nano_exact
    data: anchor_manifest_default
    preprocessing: runtime_default
    training: prior_constant_lr
rows:
- order: 1
  delta_id: delta_label_token
  status: completed
  dimension_family: model
  family: target_conditioning
  binary_applicable: true
  description: Replace mean-padded linear target conditioning with train-label embeddings
    plus a learned test token.
  rationale: This is the smallest staged departure from upstream nanoTabPFN and should
    be measured before shared normalization or block-style changes.
  hypothesis: Discrete label tokens may sharpen small-binary support-set conditioning,
    but any loss could reflect embedding initialization or calibration drift rather
    than the idea itself.
  upstream_delta: Upstream nanoTabPFN does not use label tokens on the binary path.
  anchor_delta: Changes only target_conditioner from mean_padded_linear to label_token;
    feature encoder, tokenizer, table block, row pooling, data, and preprocessing
    remain anchored.
  entangled_legacy_stage: label_token
  expected_effect: Better label separation on some binary tasks with possible increased
    variance on tiny support sets.
  adequacy_knobs:
  - many_class_base should stay at 2 on the locked binary surface.
  - Negative evidence should be checked for calibration drift before rejection.
  parameter_adequacy_policy:
    default_plan:
    - Confirm the isolated toggle before changing optimizer settings.
    - If weak, inspect whether the issue is decision-boundary sharpness or late-curve
      drift.
    default_negative_decision: defer
    reject_requires:
    - isolated_change
    - adequacy_plan_complete
    - clearly_worse_without_offsetting_benefit
  applicability_guards: []
  model:
    stage_label: delta_label_token
    module_overrides:
      target_conditioner: label_token
  data:
    surface_label: anchor_manifest_default
  preprocessing:
    surface_label: runtime_default
  training:
    surface_label: prior_constant_lr
    overrides: {}
  parameter_adequacy_plan:
  - Confirm the isolated toggle before changing optimizer settings.
  - If weak, inspect whether the issue is decision-boundary sharpness or late-curve
    drift.
  run_id: sd_binary_md_v1_01_delta_label_token_v1
  followup_run_ids: []
  decision: defer
  interpretation_status: interpreted
  confounders:
  - No direct calibration or decision-boundary diagnostic was run, so the source of
    the aggregate drop is still inferred from ROC behavior only.
  - Dataset-level movement is mixed, with isolated gains on a few tasks despite clearly
    negative aggregate ROC deltas.
  next_action: Keep this as completed negative evidence and only revisit label-token
    conditioning if a calibration-focused follow-up becomes justified.
  notes:
  - Completed run `sd_binary_md_v1_01_delta_label_token_v1` against anchor `01_nano_exact_md_prior_parity_fix_binary_medium_v1`.
  - 'Aggregate delta versus anchor: best ROC AUC `-0.0143`, final ROC AUC `-0.0171`.'
  - Training was slower than anchor by `+33.5s` at best and `+21.7s` at final.
  - Largest losses appeared on `banana` and `Amazon_employee_access`; modest gains
    appeared on `quake` and `Titanic`.
- order: 2
  delta_id: delta_shared_feature_norm
  status: completed
  dimension_family: model
  family: feature_encoding
  binary_applicable: true
  description: Replace the internal nano feature path with the shared linear feature
    encoder while keeping scalar-per-feature tokenization.
  rationale: This isolates shared normalization and shared feature weights without
    changing the table block or row readout.
  hypothesis: Shared feature encoding may help the staged family generalize across
    varied feature identities, but it also moves normalization responsibility outside
    the nano-exact path.
  upstream_delta: Upstream nanoTabPFN keeps its own internal feature normalization/encoding
    path.
  anchor_delta: Changes only feature_encoder from nano to shared; tokenizer, target
    conditioning, table block, row pooling, data, and preprocessing remain fixed.
  entangled_legacy_stage: shared_norm
  expected_effect: Better transfer across heterogeneous columns, with risk that the
    shared path simply mismatches the compact binary anchor scale.
  adequacy_knobs:
  - input_normalization remains train_zscore_clip on the anchor unless the queue row
    explicitly changes preprocessing.
  - If performance drops, note whether the harm appears early or only after longer
    training.
  parameter_adequacy_policy:
    default_plan:
    - Keep optimizer and row/context structure fixed for the first pass.
    - Only treat a weak result as structural evidence after checking whether normalization
      mismatch is the dominant failure mode.
    default_negative_decision: defer
    reject_requires:
    - isolated_change
    - adequacy_plan_complete
    - clearly_worse_without_offsetting_benefit
  applicability_guards: []
  model:
    stage_label: delta_shared_feature_norm
    module_overrides:
      feature_encoder: shared
  data:
    surface_label: anchor_manifest_default
  preprocessing:
    surface_label: runtime_default
  training:
    surface_label: prior_constant_lr
    overrides: {}
  parameter_adequacy_plan:
  - Keep optimizer and row/context structure fixed for the first pass.
  - Only treat a weak result as structural evidence after checking whether normalization
    mismatch is the dominant failure mode.
  run_id: sd_binary_md_v1_02_delta_shared_feature_norm_v1
  followup_run_ids: []
  decision: defer
  interpretation_status: interpreted
  confounders:
  - The row reached a better peak than the anchor but retained that gain poorly by
    the final checkpoint, so the negative final result is still entangled with budget
    or normalization mismatch.
  - The shared-normalization path required an MPS compatibility fix before this completed
    run, so there is no pre-fix row-2 baseline on the same device path.
  next_action: Keep this as completed mixed evidence and only schedule a bounded follow-up
    if we want to test whether shorter budgets or downstream normalization mismatch
    explain the late-curve drop.
  notes:
  - Completed run `sd_binary_md_v1_02_delta_shared_feature_norm_v1` against anchor
    `01_nano_exact_md_prior_parity_fix_binary_medium_v1`.
  - 'Aggregate delta versus anchor: best ROC AUC `+0.0039`, final ROC AUC `-0.0041`.'
  - Training was slower than anchor by `+42.6s` at best and `+25.7s` at final.
  - Best-point signal was positive, but final retention was materially worse than
    the anchor.
- order: 3
  delta_id: delta_prenorm_block
  status: completed
  dimension_family: model
  family: table_block
  binary_applicable: true
  description: Switch the cell transformer from the nano post-norm block to the staged
    pre-norm block, still without test self-attention.
  rationale: This isolates normalization/block ordering before introducing any new
    attention edges or tokenization changes.
  hypothesis: Pre-norm may stabilize optimization at compact scale, but a loss may
    simply mean the head/optimizer neighborhood was tuned around post-norm behavior.
  upstream_delta: Upstream nanoTabPFN uses the post-norm block only.
  anchor_delta: Changes only table_block_style from nano_postnorm to prenorm with
    allow_test_self_attention=false.
  entangled_legacy_stage: prenorm_block
  expected_effect: Potentially smoother optimization and lower drift, with the risk
    that post-norm remains better matched to the benchmark wrapper.
  adequacy_knobs:
  - The relevant knobs are still tficl_n_heads, tficl_n_layers, and head_hidden_dim.
  - A weak result is ambiguous unless late-curve stability clearly worsens despite
    similar best-step performance.
  parameter_adequacy_policy:
    default_plan:
    - Compare best ROC AUC, final ROC AUC, and drift jointly.
    - Defer rather than reject if only the late portion of training worsens without
      a clear hyperparameter adequacy check.
    default_negative_decision: defer
    reject_requires:
    - isolated_change
    - adequacy_plan_complete
    - clearly_worse_without_offsetting_benefit
  applicability_guards: []
  model:
    stage_label: delta_prenorm_block
    module_overrides:
      table_block_style: prenorm
      allow_test_self_attention: false
  data:
    surface_label: anchor_manifest_default
  preprocessing:
    surface_label: runtime_default
  training:
    surface_label: prior_constant_lr
    overrides: {}
  parameter_adequacy_plan:
  - Compare best ROC AUC, final ROC AUC, and drift jointly.
  - Defer rather than reject if only the late portion of training worsens without
    a clear hyperparameter adequacy check.
  run_id: sd_binary_md_v1_03_delta_prenorm_block_v1
  followup_run_ids: []
  decision: defer
  interpretation_status: interpreted
  confounders:
  - The row is clearly negative versus the anchor, but it still uses the anchor optimizer
    and head neighborhood, so the mechanism-versus-tuning split is not fully closed.
  - This row is now the required local comparator for `delta_test_self_attention`,
    so its main value is both negative evidence and an interpretive baseline.
  next_action: Keep this as completed negative evidence and compare any self-attention
    benefit against both the anchor and this pre-norm-only baseline.
  notes:
  - Completed run `sd_binary_md_v1_03_delta_prenorm_block_v1` against anchor `01_nano_exact_md_prior_parity_fix_binary_medium_v1`.
  - 'Aggregate delta versus anchor: best ROC AUC `-0.0142`, final ROC AUC `-0.0164`.'
  - Training was slower than anchor by `+136.0s` at best and `+3.3s` at final.
  - Largest losses appeared on `banana`, `Amazon_employee_access`, and `blood-transfusion-service-center`;
    modest gains appeared on `haberman` and `diabetes`.
- order: 4
  delta_id: delta_test_self_attention
  status: completed
  dimension_family: model
  family: table_block
  binary_applicable: true
  description: Allow test-token self-attention inside the pre-norm block without adding
    any test-to-test cross-attention.
  rationale: This isolates the masking change from tokenizer, row-pool, and context-encoder
    changes.
  hypothesis: Keeping each test token's own state through the block may help the direct
    head, but any failure could mean the surrounding block settings are still mismatched.
  upstream_delta: Upstream nanoTabPFN blocks test-token self attention in the direct
    path.
  anchor_delta: Starting from the explicit pre-norm block, change only allow_test_self_attention
    from false to true.
  entangled_legacy_stage: test_self
  expected_effect: Better preservation of per-test-token state with possible over-conditioning
    on individual test rows.
  adequacy_knobs:
  - Interpretation depends on the paired pre-norm-only result; a weak result may just
    indicate the block style itself remains unsettled.
  parameter_adequacy_policy:
    default_plan:
    - Compare directly against both the anchor and the pre-norm-only row in the written
      interpretation.
    default_negative_decision: defer
    reject_requires:
    - isolated_change
    - adequacy_plan_complete
    - clearly_worse_without_offsetting_benefit
  applicability_guards: []
  model:
    stage_label: delta_test_self_attention
    module_overrides:
      table_block_style: prenorm
      allow_test_self_attention: true
  data:
    surface_label: anchor_manifest_default
  preprocessing:
    surface_label: runtime_default
  training:
    surface_label: prior_constant_lr
    overrides: {}
  parameter_adequacy_plan:
  - Compare directly against both the anchor and the pre-norm-only row in the written
    interpretation.
  run_id: sd_binary_md_v1_04_delta_test_self_attention_v1
  followup_run_ids: []
  decision: defer
  interpretation_status: interpreted
  confounders:
  - This row is easiest to interpret after delta_prenorm_block has data.
  - The result is nested inside the explicit pre-norm block, so it shows local recovery
    versus row 3 more clearly than it shows superiority to the anchor.
  next_action: Keep this as completed mixed evidence; treat self-attention as a local
    repair to the pre-norm row rather than a launch-ready improvement over the anchor.
  notes:
  - Completed run `sd_binary_md_v1_04_delta_test_self_attention_v1` against anchor
    `01_nano_exact_md_prior_parity_fix_binary_medium_v1` and local comparator `sd_binary_md_v1_03_delta_prenorm_block_v1`.
  - 'Aggregate delta versus anchor: best ROC AUC `-0.0067`, final ROC AUC `-0.0051`.'
  - 'Aggregate delta versus pre-norm comparator: best ROC AUC `+0.0075`, final ROC
    AUC `+0.0113`.'
  - Training remained slower than anchor by `+204.9s` at best and `+15.5s` at final.
  - Largest remaining losses versus anchor appeared on `banana`, `Amazon_employee_access`,
    and `Titanic`, while the strongest recovery versus row 3 appeared on `blood-transfusion-service-center`,
    `banana`, and `Amazon_employee_access`.
- order: 5
  delta_id: delta_shifted_grouped_tokenizer
  status: blocked_on_surface_semantics
  dimension_family: model
  family: tokenization
  binary_applicable: true
  description: Replace scalar-per-feature tokenization with the shifted grouped tokenizer
    while keeping downstream row/context structure anchored.
  rationale: The anchor keeps the nano feature encoder, which bypasses tokenizer outputs
    entirely, so this row is not isolatable until the surface changes away from the
    nano path.
  hypothesis: Local grouped views may help feature interaction modeling, but this
    row cannot produce that signal while the nano encoder remains active.
  upstream_delta: Upstream nanoTabPFN keeps one scalar token per feature.
  anchor_delta: Would change only tokenizer from scalar_per_feature to shifted_grouped,
    but that override is currently ineffective under the anchor's nano feature encoder.
  entangled_legacy_stage: grouped_tokens
  expected_effect: None until the tokenizer becomes part of the effective computation
    graph on this surface.
  adequacy_knobs:
  - Revisit only after the comparison surface switches to a non-nano feature encoder.
  parameter_adequacy_policy:
    default_plan:
    - Do not run while tokenizer changes are bypassed by the active feature encoder.
    default_negative_decision: defer
    reject_requires:
    - isolated_change
    - adequacy_plan_complete
    - clearly_worse_without_offsetting_benefit
  applicability_guards:
  - kind: requires_anchor_model_selection
    key: feature_encoder
    any_of:
    - shared
    failure_status: blocked_on_surface_semantics
    failure_interpretation_status: blocked
    failure_next_action: Unblock only after the comparison surface makes tokenizer
      changes effective, or replace this row with a genuinely isolatable tokenization
      experiment.
  model:
    stage_label: delta_shifted_grouped_tokenizer
    module_overrides:
      tokenizer: shifted_grouped
  data:
    surface_label: anchor_manifest_default
  preprocessing:
    surface_label: runtime_default
  training:
    surface_label: prior_constant_lr
    overrides: {}
  parameter_adequacy_plan:
  - Do not run while tokenizer changes are bypassed by the active feature encoder.
  run_id: null
  followup_run_ids: []
  decision: null
  interpretation_status: blocked
  confounders:
  - The nano feature encoder ignores tokenizer outputs, so this row would execute
    the anchor path unchanged.
  next_action: Unblock only after the comparison surface makes tokenizer changes effective,
    or replace this row with a genuinely isolatable tokenization experiment.
  notes: []
- order: 6
  delta_id: delta_row_cls_pool
  status: completed
  dimension_family: model
  family: row_pool
  binary_applicable: true
  description: Replace target-column pooling with CLS-based row pooling while leaving
    tokenizer, column encoder, and context encoder otherwise anchored.
  rationale: This is the row you called out directly; the structure change is large
    enough that its introduced capacity knobs must be reported and interpreted, not
    hidden.
  hypothesis: CLS pooling may extract better row summaries, but a weak result is not
    evidence against the mechanism unless tfrow_n_heads, tfrow_n_layers, and tfrow_cls_tokens
    are adequate.
  upstream_delta: Upstream nanoTabPFN does not use row-level CLS pooling.
  anchor_delta: Changes only row_pool from target_column to row_cls.
  entangled_legacy_stage: row_cls_pool
  expected_effect: Richer row aggregation with substantial added capacity and masking
    sensitivity.
  adequacy_knobs:
  - tfrow_n_heads
  - tfrow_n_layers
  - tfrow_cls_tokens
  parameter_adequacy_policy:
    default_plan:
    - Initial run isolates the structural toggle only.
    - If neutral-to-bad, perform a bounded adequacy sweep over tfrow_n_heads, tfrow_n_layers,
      and tfrow_cls_tokens before any reject decision.
    - Document whether the row pool appears under-capacity, over-capacity, or simply
      incompatible with the anchor tokenizer.
    default_negative_decision: defer
    reject_requires:
    - isolated_change
    - adequacy_plan_complete
    - clearly_worse_without_offsetting_benefit
  applicability_guards: []
  model:
    stage_label: delta_row_cls_pool
    module_overrides:
      row_pool: row_cls
  data:
    surface_label: anchor_manifest_default
  preprocessing:
    surface_label: runtime_default
  training:
    surface_label: prior_constant_lr
    overrides: {}
  parameter_adequacy_plan:
  - Initial run isolates the structural toggle only.
  - If neutral-to-bad, perform a bounded adequacy sweep over tfrow_n_heads, tfrow_n_layers,
    and tfrow_cls_tokens before any reject decision.
  - Document whether the row pool appears under-capacity, over-capacity, or simply
    incompatible with the anchor tokenizer.
  run_id: sd_binary_md_v1_06_delta_row_cls_pool_v1
  followup_run_ids:
  - sd_binary_md_v1_06f1_delta_row_cls_pool_heads4_v1
  - sd_binary_md_v1_06f2_delta_row_cls_pool_layers1_v1
  - sd_binary_md_v1_06f3_delta_row_cls_pool_cls2_v1
  decision: defer
  interpretation_status: interpreted
  confounders:
  - Row CLS pooling adds both a new aggregation rule and new capacity knobs.
  - Smaller row-CLS configurations improved stability without recovering quality,
    which leaves the remaining gap split between over-capacity and a likely mismatch
    with the anchor tokenizer and readout surface.
  next_action: Keep this as completed negative evidence, then run delta_row_cls_pool_rmsnorm
    to test whether normalization changes can convert the CLS-token stability gain
    into useful benchmark quality.
  notes:
  - Completed primary run sd_binary_md_v1_06_delta_row_cls_pool_v1 plus bounded adequacy
    follow-ups sd_binary_md_v1_06f1_delta_row_cls_pool_heads4_v1, sd_binary_md_v1_06f2_delta_row_cls_pool_layers1_v1,
    and sd_binary_md_v1_06f3_delta_row_cls_pool_cls2_v1.
  - 'Primary row-CLS was decisively negative versus anchor: best ROC AUC -0.1763,
    final ROC AUC -0.2557, with final grad norm 3225276.25.'
  - heads4 reduced gradient severity materially, but benchmark quality remained worse
    than the primary row on best ROC AUC and far below anchor at final ROC AUC -0.2308.
  - layers1 did not stabilize the mechanism; it reached max grad norm 798033856.0
    and finished at chance-level final ROC AUC 0.5000.
  - cls2 was the cleanest adequacy variant on stability, with final grad norm 0.0492,
    but still finished far below anchor at best ROC AUC -0.1881 and final ROC AUC
    -0.2660.
  - 'Combined interpretation: the default row-CLS setting looks over-capacity for
    this surface, especially on CLS token count, but stabilization alone did not make
    row-CLS competitive, so the mechanism still appears mismatched to the anchor nano-exact
    surface.'
- order: 7
  delta_id: delta_row_cls_pool_rmsnorm
  status: completed
  dimension_family: model
  family: row_pool
  binary_applicable: true
  description: Keep the row-CLS pooling path but replace its row-encoder LayerNorm
    modules with RMSNorm.
  rationale: This keeps the row-CLS structural change but isolates the row-encoder
    normalization choice after the base row-CLS evidence is in hand.
  hypothesis: RMSNorm may reduce row-CLS instability, but a weak result could still
    mean the row-CLS mechanism is mismatched to the anchor surface rather than merely
    badly normalized.
  upstream_delta: Upstream nanoTabPFN does not use row-level CLS pooling or this row-encoder
    normalization path.
  anchor_delta: Starting from the anchor, change row_pool from target_column to row_cls
    and row-encoder normalization from LayerNorm to RMSNorm.
  entangled_legacy_stage: row_cls_pool
  expected_effect: Potentially more stable row-CLS optimization, with the risk that
    normalization changes only mask a deeper mechanism mismatch.
  adequacy_knobs:
  - tfrow_n_heads
  - tfrow_n_layers
  - tfrow_cls_tokens
  parameter_adequacy_policy:
    default_plan:
    - Compare directly against both the anchor and the resolved row-CLS evidence.
    - If neutral-to-bad, perform a bounded adequacy sweep over tfrow_n_heads, tfrow_n_layers,
      and tfrow_cls_tokens before any reject decision.
    - Document whether RMSNorm improves stability, quality, or neither.
    default_negative_decision: defer
    reject_requires:
    - isolated_change
    - adequacy_plan_complete
    - clearly_worse_without_offsetting_benefit
  applicability_guards: []
  model:
    stage_label: delta_row_cls_pool_rmsnorm
    module_overrides:
      row_pool: row_cls
    tfrow_norm: rmsnorm
  data:
    surface_label: anchor_manifest_default
  preprocessing:
    surface_label: runtime_default
  training:
    surface_label: prior_constant_lr
    overrides: {}
  parameter_adequacy_plan:
  - Compare directly against both the anchor and the resolved row-CLS evidence.
  - If neutral-to-bad, perform a bounded adequacy sweep over tfrow_n_heads, tfrow_n_layers,
    and tfrow_cls_tokens before any reject decision.
  - Document whether RMSNorm improves stability, quality, or neither.
  run_id: sd_binary_md_v1_07_delta_row_cls_pool_rmsnorm_v1
  followup_run_ids: []
  decision: defer
  interpretation_status: interpreted
  confounders:
  - RMSNorm changes row-encoder stabilization without addressing any deeper tokenizer
    or readout mismatch by itself.
  - The primary RMSNorm row was enough to show that normalization alone does not rescue
    the default row-CLS path, but it does not answer whether a smaller RMSNorm row-CLS
    configuration such as cls2 would behave better.
  next_action: Keep this as completed negative evidence for the default RMSNorm row-CLS
    path, then move to delta_column_set_encoder; only revisit RMSNorm later if a targeted
    smaller-capacity row-CLS combination becomes worth testing.
  notes:
  - Completed run sd_binary_md_v1_07_delta_row_cls_pool_rmsnorm_v1 against anchor
    01_nano_exact_md_prior_parity_fix_binary_medium_v1 and interpreted directly against
    the completed LayerNorm row-CLS evidence.
  - 'Aggregate delta versus anchor: best ROC AUC -0.1957, final ROC AUC -0.2629.'
  - The RMSNorm row was slightly worse than the LayerNorm row-CLS primary on both
    best and final ROC AUC, and slightly worse than the LayerNorm cls2 adequacy variant
    on best ROC AUC.
