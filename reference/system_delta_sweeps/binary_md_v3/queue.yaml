rows:
- order: 1
  delta_ref: delta_preproc_impute_missing_off
  status: blocked_on_artifacts
  rationale: Benchmark the promoted Shared+LayerNorm surface on the draft missingness
    bundle with runtime imputation disabled, but only after the missingness-specific
    anchor artifacts exist.
  hypothesis: Raw-missing support tensors may improve attribution for genuinely
    missing-valued tasks once the missingness manifests and anchor are frozen.
  anchor_delta: Changes only preprocessing by switching the draft missingness
    surface from `runtime_default` to `runtime_no_impute`.
  model:
    stage_label: anchor_model
  data:
    surface_label: missing_manifest_default
    surface_overrides:
      source: manifest
      filter_policy: include_all
      missing_value_policy: allow_any
      allow_missing_values: true
  preprocessing:
    surface_label: runtime_no_impute
    overrides:
      impute_missing: false
  training:
    surface_label: prior_constant_lr
    overrides: {}
  parameter_adequacy_plan:
  - Confirm the finalized missingness bundle actually exercises support-side missing
    values before interpreting the row.
  - Compare against the frozen missingness anchor rather than the no-missing predecessor.
  run_id: null
  followup_run_ids: []
  decision: null
  interpretation_status: blocked
  confounders: []
  next_action: Freeze `cls_benchmark_linear_v3` on `nanotabpfn_openml_binary_medium_missing_v1`,
    register `01_shared_norm_post_ln_binary_medium_missing_v1`, materialize the
    `missing_manifest_default`, `missing_manifest_forbid_any`, and `missing_manifest_accepted_only`
    artifacts, and reserve track `system_delta_binary_medium_missing_v1` before
    moving this row to `ready`.
  notes:
  - Required runtime raw-missing policy is encoded in the surfaced preprocessing
    label, not implied by the queue prose.
