    with `gradient_history.jsonl` and `telemetry.json`.
  - Compare later bridge rows against this replay rather than treating the older prior-lane
    anchor as artifact-complete.
  run_id: null
  followup_run_ids: []
  decision: null
  interpretation_status: pending
  confounders: []
