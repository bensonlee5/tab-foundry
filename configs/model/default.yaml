d_col: 128
d_icl: 512
input_normalization: none
# Default favors scalable row-encoder token counts; set to 1 to recover paper-faithful per-feature tokens.
feature_group_size: 32
many_class_train_mode: path_nll
max_mixed_radix_digits: 64
tfcol_n_heads: 8
tfcol_n_layers: 3
tfcol_n_inducing: 128
tfrow_n_heads: 8
tfrow_n_layers: 3
tfrow_cls_tokens: 4
tficl_n_heads: 8
tficl_n_layers: 12
tficl_ff_expansion: 2
many_class_base: 10
head_hidden_dim: 1024
use_digit_position_embed: true
