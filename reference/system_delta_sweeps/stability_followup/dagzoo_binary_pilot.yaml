# Binary-only dagzoo pilot for the stability_followup sweep.
# This file is consumed by the sibling dagzoo checkout via:
#   cd ../dagzoo
#   uv run dagzoo generate --config ../tab-foundry/reference/system_delta_sweeps/stability_followup/dagzoo_binary_pilot.yaml --handoff-root ...

seed: 1
dataset:
  task: classification
  n_train: 768
  n_test: 256
  n_features_min: 16
  n_features_max: 64
  n_classes_min: 2
  n_classes_max: 2
  categorical_ratio_min: 0.0
  categorical_ratio_max: 1.0
  max_categorical_cardinality: 9
  missing_rate: 0.0
  missing_mechanism: none
  missing_mar_observed_fraction: 0.5
  missing_mar_logit_scale: 1.0
  missing_mnar_logit_scale: 1.0
graph:
  n_nodes_min: 2
  n_nodes_max: 32
mechanism:
  function_family_mix: null
runtime:
  device: auto
  torch_dtype: float32
output:
  out_dir: data/stability_followup_binary_pilot
  shard_size: 128
  compression: zstd
diagnostics:
  enabled: false
  include_spearman: false
  histogram_bins: 10
  quantiles: [0.05, 0.25, 0.5, 0.75, 0.95]
  underrepresented_threshold: 0.5
  max_values_per_metric: 50000
  meta_feature_targets: {}
  out_dir: null
benchmark:
  preset_name: medium_cuda
  suite: standard
  num_datasets: 200
  warmup_datasets: 10
  warn_threshold_pct: 10.0
  fail_threshold_pct: 20.0
  collect_memory: true
  collect_reproducibility: false
  reproducibility_num_datasets: 2
  latency_num_samples: 20
  presets:
    cpu:
      device: cpu
      num_datasets: 200
      warmup_datasets: 10
    cuda_desktop:
      device: cuda
      num_datasets: 1500
      warmup_datasets: 20
    cuda_h100:
      device: cuda
      num_datasets: 5000
      warmup_datasets: 50
filter:
  enabled: false
  n_estimators: 25
  max_depth: 6
  max_features: auto
  n_bootstrap: 200
  threshold: 0.95
  max_attempts: 3
