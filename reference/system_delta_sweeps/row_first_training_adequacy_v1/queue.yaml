      column_encoder: none
  data:
    surface_label: anchor_manifest_default
  preprocessing:
    surface_label: runtime_default
  training:
    surface_label: prior_linear_warmup_decay
    prior_dump_non_finite_policy: skip
    overrides:
      apply_schedule: true
      optimizer:
        name: muon
        require_requested: true
        weight_decay: 0.01
        betas:
        - 0.9
        - 0.95
        min_lr: 1.0e-6
        muon_per_parameter_lr: true
        muon_lr_scale_base: 0.2
        muon_partition_non2d: true
      runtime:
        max_steps: 2500
        eval_every: 25
        checkpoint_every: 25
        trace_activations: false
      schedule:
        stages:
        - name: stage1
          steps: 2500
          lr_max: 0.004
          lr_schedule: linear
          warmup_ratio: 0.05
  parameter_adequacy_plan:
  - Treat this as a bounded optimizer-family comparison and defer rather than reject if the first Muon read is mixed.
  - Compare final log loss first, then use Brier, ROC AUC, gradient norms, and clip fraction as supporting diagnostics.
