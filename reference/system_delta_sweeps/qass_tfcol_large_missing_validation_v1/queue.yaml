  parameter_adequacy_plan:
  - Read this row only against row 1 on the same large missing-permitting bundle using
    `vs_parent`.
  - Promote `row_cls + qass + tfcol_heads4` only if row 2 beats row 1 on final log
    loss and final Brier, and the final ROC AUC delta is no worse than `-0.005`.
  run_id: sd_qass_tfcol_large_missing_validation_v1_02_delta_qass_context_tfcol_heads4_v1_v1
  followup_run_ids: []
  decision: defer
  interpretation_status: completed
  confounders: []
  next_action: Retain this row as a documented calibration-oriented alternative,
    but do not treat it as the default post-008 line.
  notes:
  - Row 2 improved final Brier and final ROC AUC on the missing-permitting bundle,
    but it missed the planned promotion rule because final log loss was slightly
    worse than row 1 by about `+0.0000045`.
  - Final metrics for the canonical run were log loss `0.42151508`, Brier `0.26432957`,
    and ROC AUC `0.67529660`; this remains useful retained evidence for calibration-oriented
    follow-up work.
  - The best checkpoint looked stronger than the final checkpoint, but TF-RD-008
    settles on the planned final-metric rule rather than reopening another adequacy
    branch inside this issue.
  - This row remains materially larger than the default no-TFCol line (`1,295,618`
    parameters versus `868,706`), so it is retained as a non-default variant.
  - >-
