# @package _global_

task: classification
model:
  d_icl: 96
  input_normalization: train_zscore_clip
  many_class_base: 2
  tficl_n_heads: 4
  tficl_n_layers: 3
  head_hidden_dim: 192
runtime:
  device: auto
  mixed_precision: "no"
  num_workers: 0
  grad_clip: 1.0
  grad_accum_steps: 1
  eval_every: 25
  checkpoint_every: 25
  val_batches: 0
  max_steps: 2500
optimizer:
  name: schedulefree_adamw
  require_requested: true
  weight_decay: 0.0
  betas: [0.9, 0.999]
  min_lr: 4.0e-3
  muon_per_parameter_lr: false
  muon_lr_scale_base: 0.2
  muon_partition_non2d: true
training:
  surface_label: prior_cosine_warmup
  apply_schedule: true
schedule:
  stages:
    - name: prior_dump
      steps: 2500
      lr_max: 4.0e-3
      lr_schedule: cosine
      warmup_ratio: 0.05
logging:
  history_jsonl_path: ${runtime.output_dir}/train_history.jsonl
