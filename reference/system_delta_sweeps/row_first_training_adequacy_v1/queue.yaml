        require_requested: true
        weight_decay: 0.0
        betas:
        - 0.9
        - 0.999
        min_lr: 0.0004
        muon_per_parameter_lr: false
      runtime:
        max_steps: 2500
        eval_every: 25
        checkpoint_every: 25
        trace_activations: false
      schedule:
        stages:
        - name: stage1
          steps: 2500
          lr_max: 0.004
          lr_schedule: linear
          warmup_ratio: 0.05
  parameter_adequacy_plan:
  - Read this row only as an optimizer-family comparator on the settled warmup-decay schedule.
  - Prefer it only if it is competitive on the primary final metric and materially cleaner on stability or training-time diagnostics.
  run_id: null
  followup_run_ids: []
  decision: null
  interpretation_status: pending
  confounders: []
  next_action: Run after the schedule-family comparison so optimizer-family effects are read on the settled schedule.
  notes: []
- order: 3
  delta_ref: delta_training_muon
  status: ready
  rationale: Give Muon one clean read on the settled row-first anchor before later sweeps keep treating it as background optimizer lore.
  hypothesis: Muon may improve convergence or late retention on the settled anchor, but any win should be read strictly as training-surface evidence.
  anchor_delta: Keep the settled warmup-decay schedule and row-first model surface fixed, but replace schedulefree AdamW with Muon using the bounded default Muon settings.
