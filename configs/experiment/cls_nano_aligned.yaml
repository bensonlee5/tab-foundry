# @package _global_

task: classification
runtime:
  output_dir: outputs/cls_nano_aligned
  device: auto
  mixed_precision: "no"
  num_workers: 0
  grad_clip: 1.0
  grad_accum_steps: 16
  eval_every: 25
  checkpoint_every: 25
  val_batches: 8
  max_steps: 2500
  target_train_seconds: 330.0
schedule:
  stages:
    - name: stage1
      steps: 2500
      lr_max: 4.0e-3
model:
  d_col: 96
  d_icl: 384
  input_normalization: train_zscore_clip
  feature_group_size: 8
  tfcol_n_heads: 4
  tfcol_n_layers: 2
  tfcol_n_inducing: 32
  tfrow_n_heads: 4
  tfrow_n_layers: 2
  tfrow_cls_tokens: 2
  tficl_n_heads: 4
  tficl_n_layers: 8
  tficl_ff_expansion: 2
  head_hidden_dim: 512
  use_digit_position_embed: false
optimizer:
  name: schedulefree_adamw
  require_requested: true
  weight_decay: 0.0
  betas: [0.9, 0.95]
  min_lr: 4.0e-3
data:
  source: nanoprior
logging:
  run_name: cls-nano-aligned
