schema: tab-foundry-system-delta-sweep-queue-v1
sweep_id: row_first_training_adequacy_v1
rows:
- order: 1
  delta_ref: delta_training_linear_decay
  status: ready
  rationale: Test whether the settled row-first anchor still needs the current 5 percent warmup once the model family itself is no longer moving.
  hypothesis: Removing warmup may keep final log loss competitive while simplifying the baseline training recipe and exposing whether warmup is carrying unnecessary caution.
  anchor_delta: Starting from the settled no-TFCol row-first anchor, set warmup to zero while keeping the schedule family, optimizer family, bundle, and model surface fixed.
  model:
    stage: qass_context
    stage_label: delta_qass_no_column_v3
    module_overrides:
      column_encoder: none
  data:
    surface_label: anchor_manifest_default
  preprocessing:
    surface_label: runtime_default
  training:
    surface_label: prior_linear_decay
    prior_dump_non_finite_policy: skip
    overrides:
      apply_schedule: true
      optimizer:
        name: schedulefree_adamw
        require_requested: true
        weight_decay: 0.0
        betas:
        - 0.9
        - 0.999
        min_lr: 0.0004
        muon_per_parameter_lr: false
      runtime:
        max_steps: 2500
        eval_every: 25
        checkpoint_every: 25
        trace_activations: false
      schedule:
        stages:
        - name: stage1
          steps: 2500
          lr_max: 0.004
          lr_schedule: linear
          warmup_ratio: 0.0
  parameter_adequacy_plan:
  - Compare final log loss first against the settled anchor, then read Brier, ROC AUC, and drift as supporting diagnostics.
  - Treat this as schedule-family evidence only and do not infer anything about the row-first architecture from the result.
  run_id: null
  followup_run_ids: []
  decision: null
  interpretation_status: pending
  confounders: []
  next_action: Run first as the no-warmup schedule comparator on the settled row-first anchor.
  notes: []
- order: 2
