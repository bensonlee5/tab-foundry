schema: tab-foundry-system-delta-sweep-v1
sweep_id: stability_followup
parent_sweep_id: stability_ladder
status: draft
complexity_level: binary_md
anchor_run_id: null
benchmark_bundle_path: src/tab_foundry/bench/nanotabpfn_openml_binary_medium_v1.json
control_baseline_id: cls_benchmark_linear_v2
comparison_policy: anchor_only
anchor_surface:
  notes:
  - This follow-up freezes the promoted prenorm plus cosine warmup baseline from the stability ladder.
  - The remaining clean-prior questions are long-horizon adequacy, linear-decay schedule closure, and one benchmark-first RowPool revisit.
  - Concern #3 is measured from existing module gradient telemetry rather than new optimizer code in this sweep.
  dimension_table:
  - dimension: feature encoder
    upstream: Scalar feature linear encoder with internal train/test z-score+clip handling.
    anchor: Shared feature encoder path with benchmark-external normalization.
    interpretation: Representation-path changes stay locked for the schedule rows.
  - dimension: cell transformer block
    upstream: Post-norm nanoTabPFN block with feature attention then row attention.
    anchor: Pre-norm cell block with feature and row attention, separate norm layers.
    interpretation: Prenorm remains the locked baseline for all rows in this follow-up.
  - dimension: training recipe
    upstream: No repo-local prior-dump training-surface contract.
    anchor: Training surface label `prior_cosine_warmup` with schedulefree AdamW, grad_clip 1.0, warmup_ratio 0.05, and the 2500-step baseline horizon.
    interpretation: The open training-dynamics questions are decay shape and long-horizon adequacy, not whether warmup exists at all.
  - dimension: row readout
    upstream: Target-column readout from the final table token.
    anchor: Same target-column readout.
    interpretation: Only the final row revisits `row_cls`, using the old cleanest `cls_tokens=2` seed on the stabilized surface.
anchor_context:
  run_id: null
  experiment: stability_followup
  config_profile: stability_followup
  model:
    arch: tabfoundry_staged
    stage: prenorm_block
    module_selection:
      allow_test_self_attention: false
      column_encoder: none
      context_encoder: none
      feature_encoder: shared
      head: binary_direct
      post_encoder_norm: layernorm
      row_pool: target_column
      table_block_style: prenorm
      target_conditioner: mean_padded_linear
      tokenizer: scalar_per_feature
  surface_labels:
    data: anchor_manifest_default
    model: warmup_grad_clip
    preprocessing: runtime_default
    training: prior_cosine_warmup
