  hypothesis: If the no-missing `heads4` win generalizes rather than collapsing on
    missing-valued tasks, row 2 should beat row 1 on both final log loss and final
    Brier while keeping the final ROC AUC gap within `-0.005`.
  anchor_delta: Starting from row 1 on the larger missing-permitting bundle, add TFCol
    back in at the selected `heads4` setting and compare the result only against the
    same-bundle no-TFCol QASS control.
