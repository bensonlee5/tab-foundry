schema: tab-foundry-system-delta-queue-v1
generated_from_sweep_id: binary_md_v2
catalog_path: reference/system_delta_catalog.yaml
canonical_sweep_path: reference/system_delta_sweeps/binary_md_v2/sweep.yaml
canonical_queue_path: reference/system_delta_sweeps/binary_md_v2/queue.yaml
canonical_matrix_path: reference/system_delta_sweeps/binary_md_v2/matrix.md
sweep_id: binary_md_v2
parent_sweep_id: binary_md_v1
sweep_status: active
complexity_level: binary_md
anchor_run_id: 01_nano_exact_md_prior_parity_fix_binary_medium_v1
benchmark_bundle_path: src/tab_foundry/bench/nanotabpfn_openml_binary_medium_v1.json
control_baseline_id: cls_benchmark_linear_v2
comparison_policy: anchor_only
upstream_reference:
  name: nanoTabPFN
  model_source: https://github.com/automl/nanoTabPFN/blob/main/model.py
anchor_surface:
  notes:
  - The locked anchor is the current canonical benchmark-facing staged run on the
    10-task medium binary bundle.
  - Relative to upstream nanoTabPFN, the anchor keeps the nano-exact active path but
    runs inside the general tabfoundry_staged shell.
  - Data and preprocessing remain part of the comparison surface and must stay fixed
    unless the queue row declares that exact dimension.
  dimension_table:
  - dimension: feature encoder
    upstream: Scalar feature linear encoder with internal train/test z-score+clip
      handling.
    anchor: Same nano feature encoder path.
    interpretation: Functional parity should be close; remaining differences come
      from the staged wrapper and metadata surface, not the active encoder math.
  - dimension: target conditioning
    upstream: Mean-padded linear target encoder.
    anchor: Same mean-padded linear target conditioner.
    interpretation: The anchor intentionally preserves the upstream label-conditioning
      mechanism.
  - dimension: cell transformer block
    upstream: Post-norm nanoTabPFN block with feature attention then row attention.
    anchor: Same nano post-norm block.
    interpretation: This is the strongest structural anchor to upstream parity.
  - dimension: row readout
    upstream: Target-column readout from the final cell tensor.
    anchor: Same target-column row pool.
    interpretation: Later row-pool experiments should be interpreted as explicit departures
      from upstream, not minor tuning.
  - dimension: tokenizer
    upstream: One scalar token per feature.
    anchor: Same scalar-per-feature tokenizer.
    interpretation: Grouped-token changes must be isolated from later row/context
      changes.
  - dimension: context encoder
    upstream: None on the direct binary path.
    anchor: None on the direct binary path.
    interpretation: Any context encoder row changes both compute graph depth and target-conditioning
      semantics and therefore needs its own adequacy commentary.
  - dimension: training data surface
    upstream: OpenML notebook tasks only for benchmarking; no repo-local prior-training
      manifest contract.
    anchor: Repo-local manifest-driven prior-training surface at data/manifests/default.parquet.
    interpretation: Data-source changes are first-class sweep rows, not background
      assumptions.
  - dimension: preprocessing
    upstream: Notebook preprocessing inside the benchmark helper.
    anchor: Runtime support-set preprocessing with mean imputation and train-only
      label remap/filter semantics.
    interpretation: Preprocessing changes can alter the effective task definition
      and must be tracked explicitly.
  - dimension: training recipe
    upstream: No repo-local prior-dump training-surface contract.
    anchor: Exact-prior training surface label `prior_constant_lr`.
    interpretation: Optimizer and schedule changes are first-class sweep rows, not
      silent background recipe assumptions.
anchor_context:
  run_id: 01_nano_exact_md_prior_parity_fix_binary_medium_v1
  model:
    arch: tabfoundry_staged
    stage: nano_exact
    stage_label: nano_exact
    module_selection:
      feature_encoder: nano
      post_encoder_norm: none
      target_conditioner: mean_padded_linear
      tokenizer: scalar_per_feature
      column_encoder: none
      row_pool: target_column
      context_encoder: none
      head: binary_direct
      table_block_style: nano_postnorm
      allow_test_self_attention: false
  surface_labels:
    model: nano_exact
    data: anchor_manifest_default
    preprocessing: runtime_default
    training: prior_constant_lr
rows:
- order: 1
  delta_id: delta_anchor_activation_trace_baseline
  status: completed
  dimension_family: training
  family: diagnostics
  binary_applicable: true
  description: Keep the locked anchor model surface fixed but rerun prior training
    with activation tracing enabled so forward-pass norm dynamics are captured in
    `gradient_history.jsonl` and `telemetry.json`.
  rationale: Establish a traced anchor baseline before rerunning the shared-encoder
    rows so activation-scale shifts can be interpreted against the unchanged model
    surface.
  hypothesis: Activation tracing should be additive only; the traced anchor rerun
    is expected to preserve anchor-quality behavior while revealing the forward-pass
    norm profile entering and traversing the transformer.
  upstream_delta: Upstream nanoTabPFN does not emit comparable forward-pass activation
    telemetry.
  anchor_delta: Keeps the anchor model, data, and preprocessing surfaces fixed and
    changes only the training recipe by enabling activation tracing.
  entangled_legacy_stage: none
  expected_effect: No model-quality change is expected; this row establishes the traced
    anchor baseline needed to interpret later shared-encoder stabilization runs.
  adequacy_knobs:
  - Treat this as a diagnostic rerun of the anchor, not a new structural model claim.
  - Confirm the additive tracing overhead does not perturb the run contract or artifact
    schema.
  parameter_adequacy_policy:
    default_plan:
    - Confirm the traced run preserves the anchor model, data, and preprocessing surfaces.
    - Use the emitted activation norms as the baseline comparator for all later stabilization
      rows.
    default_negative_decision: defer
    reject_requires:
    - isolated_change
    - adequacy_plan_complete
    - clearly_worse_without_offsetting_benefit
  applicability_guards: []
  model:
    stage_label: delta_anchor_activation_trace_baseline
  data:
    surface_label: anchor_manifest_default
  preprocessing:
    surface_label: runtime_default
  training:
    surface_label: prior_constant_lr_trace_activations
    overrides:
      runtime:
        trace_activations: true
  parameter_adequacy_plan:
  - Confirm the traced run preserves the anchor model, data, and preprocessing surfaces.
  - Use the emitted activation norms as the baseline comparator for all later stabilization
    rows.
  run_id: litf5n0i
  followup_run_ids: []
  decision: Anchor trace baseline established. Best ROC AUC 0.7596 (step 2275). Activation
    norms captured in gradient_history. NanoTabPFN best 0.7616.
  interpretation_status: completed
  confounders: []
  next_action: None
  notes:
  - 'wandb: https://wandb.ai/bensonlee55-none/tab-foundry/runs/litf5n0i'
  - final_train_loss=0.452, mean_grad_norm=0.177, max_grad_norm=4.658
- order: 2
  delta_id: delta_shared_feature_norm
  status: completed
  dimension_family: model
  family: feature_encoding
  binary_applicable: true
  description: Replace the internal nano feature path with the shared linear feature
    encoder while keeping scalar-per-feature tokenization.
  rationale: Reproduce the shared-feature-encoder row with activation tracing enabled
    so the late-curve retention gap can be separated from purely structural explanations.
  hypothesis: Shared feature encoding may still peak above the anchor, but the traced
    rerun should show whether unstable pre-transformer or per-block activation scales
    accompany the weaker final checkpoint.
  upstream_delta: Upstream nanoTabPFN keeps its own internal feature normalization/encoding
    path.
  anchor_delta: Changes feature_encoder from nano to shared and enables activation
    tracing while keeping tokenizer, target conditioning, table block, row pooling,
    data, and preprocessing fixed.
  entangled_legacy_stage: shared_norm
  expected_effect: Better transfer across heterogeneous columns, with risk that the
    shared path simply mismatches the compact binary anchor scale.
  adequacy_knobs:
  - input_normalization remains train_zscore_clip on the anchor unless the queue row
    explicitly changes preprocessing.
  - If performance drops, note whether the harm appears early or only after longer
    training.
  parameter_adequacy_policy:
    default_plan:
    - Keep optimizer and row/context structure fixed for the first pass.
    - Only treat a weak result as structural evidence after checking whether normalization
      mismatch is the dominant failure mode.
    default_negative_decision: defer
    reject_requires:
    - isolated_change
    - adequacy_plan_complete
    - clearly_worse_without_offsetting_benefit
  applicability_guards: []
  model:
    stage_label: delta_shared_feature_norm
    module_overrides:
      feature_encoder: shared
  data:
    surface_label: anchor_manifest_default
  preprocessing:
    surface_label: runtime_default
  training:
    surface_label: prior_constant_lr_trace_activations
    overrides:
      runtime:
        trace_activations: true
  parameter_adequacy_plan:
  - Keep optimizer and row/context structure fixed for the first pass.
  - Only treat a weak result as structural evidence after checking whether normalization
    mismatch is the dominant failure mode.
  run_id: 6h20zft8
  followup_run_ids: []
  decision: Shared feature encoder (no post-norm) best ROC AUC 0.7620 (step 1950),
    slightly above anchor 0.7596. Activation norms captured. NanoTabPFN best 0.7616.
  interpretation_status: completed
  confounders: []
  next_action: None
  notes:
  - 'wandb: https://wandb.ai/bensonlee55-none/tab-foundry/runs/6h20zft8'
  - final_train_loss=0.450, mean_grad_norm=0.175, max_grad_norm=4.660
- order: 3
  delta_id: delta_shared_feature_norm_with_post_layernorm
  status: completed
  dimension_family: model
  family: feature_encoding
  binary_applicable: true
  description: Shared linear feature encoder with explicit post-encoder LayerNorm
    before the transformer blocks.
  rationale: Test whether explicit LayerNorm after the shared feature encoder stabilizes
    the cell table before it enters the transformer.
  hypothesis: Post-encoder LayerNorm should reduce activation-scale drift across transformer
    blocks and improve final retention relative to the traced shared baseline.
  upstream_delta: Upstream nanoTabPFN does not expose a separate post-encoder normalization
    stage on this path.
  anchor_delta: Changes feature_encoder from nano to shared, adds post_encoder_norm=layernorm,
    and enables activation tracing while keeping the rest of the anchor surface fixed.
  entangled_legacy_stage: none
  expected_effect: LayerNorm after encoding should stabilize the activation scale
    entering the transformer and improve late-curve retention relative to the plain
    shared feature encoder row.
  adequacy_knobs:
  - Compare pre-transformer and per-block activation growth directly against the traced
    shared-without-post-norm run.
  - Keep optimizer, dataset bundle, and preprocessing fixed so only the post-encoder
    normalization changes.
  parameter_adequacy_policy:
    default_plan:
    - Compare the traced shared baseline and this row jointly before drawing conclusions
      about structural encoder quality.
    - If the row is mixed, inspect whether activation-scale stabilization improves
      drift even when final ROC AUC is neutral.
    default_negative_decision: defer
    reject_requires:
    - isolated_change
    - adequacy_plan_complete
    - clearly_worse_without_offsetting_benefit
  applicability_guards: []
  model:
    stage_label: delta_shared_norm_post_ln
    module_overrides:
      feature_encoder: shared
      post_encoder_norm: layernorm
  data:
    surface_label: anchor_manifest_default
  preprocessing:
    surface_label: runtime_default
  training:
    surface_label: prior_constant_lr_trace_activations
    overrides:
      runtime:
        trace_activations: true
  parameter_adequacy_plan:
  - Compare the traced shared baseline and this row jointly before drawing conclusions
    about structural encoder quality.
  - If the row is mixed, inspect whether activation-scale stabilization improves drift
    even when final ROC AUC is neutral.
  run_id: fedytzgt
  followup_run_ids: []
  decision: LayerNorm post-encoder achieved BEST sweep ROC AUC 0.7670 (step 2075),
    exceeding both anchor (0.7596) and shared-no-norm (0.7620). Hypothesis confirmed
    - LayerNorm stabilizes post-encoder activations. max_grad_norm reduced to 4.208
    vs anchor 4.658.
  interpretation_status: completed
  confounders: []
  next_action: None
  notes:
  - 'wandb: https://wandb.ai/bensonlee55-none/tab-foundry/runs/fedytzgt'
  - final_train_loss=0.452, mean_grad_norm=0.182, max_grad_norm=4.208
- order: 4
  delta_id: delta_shared_feature_norm_with_post_rmsnorm
  status: completed
  dimension_family: model
  family: feature_encoding
  binary_applicable: true
  description: Shared linear feature encoder with explicit post-encoder RMSNorm before
    the transformer blocks.
  rationale: Compare RMSNorm against LayerNorm as the explicit post-encoder stabilization
    stage on the shared feature path.
  hypothesis: RMSNorm may preserve more of the shared encoder scale structure than
    LayerNorm while still preventing the activation growth that hurt late-curve retention.
  upstream_delta: Upstream nanoTabPFN does not expose a separate post-encoder normalization
    stage on this path.
  anchor_delta: Changes feature_encoder from nano to shared, adds post_encoder_norm=rmsnorm,
    and enables activation tracing while keeping the rest of the anchor surface fixed.
  entangled_legacy_stage: none
  expected_effect: RMSNorm may stabilize the shared encoder activation scale with
    less feature rescaling than LayerNorm, offering a second normalization hypothesis
    for the late-curve retention gap.
  adequacy_knobs:
  - Compare against both the traced shared baseline and the post-layernorm row before
    preferring one normalization family.
  - Keep optimizer, dataset bundle, and preprocessing fixed so only the post-encoder
    normalization changes.
  parameter_adequacy_policy:
    default_plan:
    - Compare activation traces and final ROC AUC jointly against the traced shared
      baseline.
    - Use the result to separate normalization-family effects from the shared feature
      encoder itself.
    default_negative_decision: defer
    reject_requires:
    - isolated_change
    - adequacy_plan_complete
    - clearly_worse_without_offsetting_benefit
  applicability_guards: []
  model:
    stage_label: delta_shared_norm_post_rms
    module_overrides:
      feature_encoder: shared
      post_encoder_norm: rmsnorm
  data:
    surface_label: anchor_manifest_default
  preprocessing:
    surface_label: runtime_default
  training:
    surface_label: prior_constant_lr_trace_activations
    overrides:
      runtime:
        trace_activations: true
  parameter_adequacy_plan:
  - Compare activation traces and final ROC AUC jointly against the traced shared
    baseline.
  - Use the result to separate normalization-family effects from the shared feature
    encoder itself.
  run_id: r684s86u
  followup_run_ids: []
  decision: RMSNorm post-encoder best ROC AUC 0.7572 (step 1975), below both anchor
    (0.7596) and LayerNorm (0.7670). RMSNorm did not improve over shared-no-norm (0.7620).
    max_grad_norm 4.216 similar to LayerNorm. LayerNorm is the clear winner.
  interpretation_status: completed
  confounders: []
  next_action: None
  notes:
  - 'wandb: https://wandb.ai/bensonlee55-none/tab-foundry/runs/r684s86u'
  - final_train_loss=0.454, mean_grad_norm=0.182, max_grad_norm=4.216
