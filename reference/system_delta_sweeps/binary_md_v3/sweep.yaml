schema: tab-foundry-system-delta-sweep-v1
sweep_id: binary_md_v3
parent_sweep_id: binary_md_v2
status: draft
complexity_level: binary_md
anchor_run_id: 01_shared_norm_post_ln_binary_medium_v1
benchmark_bundle_path: src/tab_foundry/bench/nanotabpfn_openml_binary_medium_missing_v1.json
control_baseline_id: cls_benchmark_linear_v3
comparison_policy: anchor_only
upstream_reference:
  name: nanoTabPFN
  model_source: https://github.com/automl/nanoTabPFN/blob/main/model.py
anchor_surface:
  notes:
  - The promoted Shared+LayerNorm run `01_shared_norm_post_ln_binary_medium_v1`
    remains the no-missing predecessor for this draft workstream; it is not the
    final missingness anchor.
  - Before any row moves to `ready`, freeze `cls_benchmark_linear_v3` on bundle
    `nanotabpfn_openml_binary_medium_missing`, register
    `01_shared_norm_post_ln_binary_medium_missing_v1`, and materialize the
    `missing_manifest_default`, `missing_manifest_forbid_any`, and
    `missing_manifest_accepted_only` surfaces.
  - Reserve benchmark-facing track `system_delta_binary_medium_missing_v1` for
    this workstream so missingness experiments never land under the no-missing
    `system_delta_binary_medium_v2` track.
  dimension_table:
  - dimension: feature encoder
    upstream: Scalar feature linear encoder with internal train/test z-score+clip
      handling.
    anchor: Shared feature encoder path with benchmark-external normalization.
    interpretation: Feature encoder swaps change both the representation path and
      where normalization lives.
  - dimension: target conditioning
    upstream: Mean-padded linear target encoder on the direct binary path.
    anchor: Same mean-padded linear target conditioner.
    interpretation: The draft missingness sweep preserves the promoted label-conditioning
      path while isolating missingness handling.
  - dimension: cell transformer block
    upstream: Post-norm nanoTabPFN block with feature attention then row attention.
    anchor: Same nano post-norm cell transformer block.
    interpretation: Transformer-block changes remain out of scope for this follow-on
      missingness workstream.
  - dimension: tokenizer
    upstream: One scalar token per feature.
    anchor: Same scalar-per-feature tokenizer.
    interpretation: Tokenization stays fixed so missingness-mode rows isolate only
      missing-value representation choices.
  - dimension: column encoder
    upstream: None on the upstream direct path.
    anchor: No column-set encoder on the anchor path.
    interpretation: Column-set modeling remains absent and should not explain any
      missingness findings.
  - dimension: row readout
    upstream: Target-column readout from the final cell tensor.
    anchor: Same target-column row pool.
    interpretation: Readout remains on the direct upstream-style path.
  - dimension: context encoder
    upstream: None on the upstream direct path.
    anchor: None on the anchor path.
    interpretation: Context encoding remains absent; this workstream is about
      missingness surfaces, not deeper table structure.
  - dimension: prediction head
    upstream: Direct binary logits head.
    anchor: Direct binary logits head.
    interpretation: The prediction head stays on the narrow upstream-style binary
      path.
  - dimension: training data surface
    upstream: OpenML notebook tasks only for benchmarking; no repo-local prior-training
      manifest contract.
    anchor: Draft missingness bundle `nanotabpfn_openml_binary_medium_missing`
      with data surface label `missing_manifest_default`.
    interpretation: Missing-manifest alternatives are first-class queue rows and
      stay blocked until their artifacts exist.
  - dimension: preprocessing
    upstream: Notebook preprocessing inside the benchmark helper.
    anchor: Benchmark preprocessing surface label `runtime_default`, with raw-missing
      rows switching explicitly to `runtime_no_impute`.
    interpretation: Missingness rows must carry their required runtime policy in
      the surfaced preprocessing labels instead of inheriting it silently.
  - dimension: training recipe
    upstream: No repo-local prior-dump training-surface contract.
    anchor: Training surface label `prior_constant_lr`.
    interpretation: Training remains fixed while missingness model, data, and preprocessing
      surfaces are isolated.
anchor_context:
  run_id: 01_shared_norm_post_ln_binary_medium_v1
  experiment: cls_benchmark_staged_prior
  config_profile: cls_benchmark_staged_prior
  model:
    arch: tabfoundry_staged
    benchmark_profile: delta_shared_norm_post_ln
    stage: nano_exact
    stage_label: delta_shared_norm_post_ln
    module_selection:
      allow_test_self_attention: false
      column_encoder: none
      context_encoder: none
      feature_encoder: shared
      head: binary_direct
      post_encoder_norm: layernorm
      row_pool: target_column
      table_block_style: nano_postnorm
      target_conditioner: mean_padded_linear
      tokenizer: scalar_per_feature
  surface_labels:
    data: missing_manifest_default
    model: delta_shared_norm_post_ln
    preprocessing: runtime_default
    training: prior_constant_lr
