schema: tab-foundry-system-delta-sweep-queue-v1
sweep_id: row_embedding_attribution_v2
rows:
- order: 1
  delta_ref: delta_row_embeddings_no_context_v2
  status: ready
  rationale: Establish the stage-native row-embedding control on top of the benchmark-facing grouped-token replay before any plain-context, column-set, or QASS depth is added.
  hypothesis: If row-level aggregation is already useful on the grouped-token replay surface, the no-context `row_cls_pool` control should outperform the grouped-token anchor strongly enough to keep TF-RD-005 open even before plain context is enabled.
  anchor_delta: Starting from the grouped-token replay anchor, switch to the public `row_cls_pool` stage but override `context_encoder=none` so row embeddings are measured without added context depth.
  model:
    stage: row_cls_pool
    stage_label: delta_row_embeddings_no_context_v2
    module_overrides:
      context_encoder: none
  data:
    surface_label: anchor_manifest_default
  preprocessing:
    surface_label: runtime_default
  training:
    surface_label: prior_linear_warmup_decay
    prior_dump_non_finite_policy: skip
    overrides:
      apply_schedule: true
      optimizer:
        name: schedulefree_adamw
        require_requested: true
        weight_decay: 0.0
        betas:
        - 0.9
        - 0.999
        min_lr: 0.0004
        muon_per_parameter_lr: false
      runtime:
        max_steps: 2500
        eval_every: 25
        checkpoint_every: 25
        trace_activations: false
      schedule:
        stages:
        - name: stage1
          steps: 2500
          lr_max: 0.004
          lr_schedule: linear
          warmup_ratio: 0.05
  parameter_adequacy_plan:
  - Compare directly against the grouped-token replay anchor before enabling plain row-level context.
  - If neutral-to-bad, perform a bounded adequacy sweep over tfrow_n_heads, tfrow_n_layers, and tfrow_cls_tokens before any reject decision.
  - Treat this as the no-context control for the paired plain-context row.
  run_id: null
  followup_run_ids: []
  decision: null
  interpretation_status: pending
  confounders: []
  next_action: Run first as the stage-native row-embedding control, then compare against the paired plain-context row.
  notes:
  - Execution must use `--device auto`, `--nanotabpfn-root ~/dev/nanoTabPFN`, and `--prior-dump ~/dev/nanoTabPFN/300k_150x5_2.h5` so the anchor nanoTabPFN curve is reused instead of refreshed.

- order: 2
  delta_ref: delta_row_embeddings_plain_context_v2
  parent_delta_ref: delta_row_embeddings_no_context_v2
  status: ready
  rationale: Measure the public `row_cls_pool` stage as the matched plain-context companion to the no-context row-embedding control so TF-RD-005 can separate row embeddings from row-level context value.
  hypothesis: If plain row-level context is useful beyond row embeddings alone, the stage-native `row_cls_pool` row should beat row 1 without needing TFCol or QASS.
  anchor_delta: Starting from row 1, enable the public plain context path by removing the no-context override while keeping the rest of the `row_cls_pool` stage fixed.
  model:
    stage: row_cls_pool
    stage_label: delta_row_embeddings_plain_context_v2
  data:
    surface_label: anchor_manifest_default
  preprocessing:
    surface_label: runtime_default
  training:
    surface_label: prior_linear_warmup_decay
    prior_dump_non_finite_policy: skip
    overrides:
      apply_schedule: true
      optimizer:
        name: schedulefree_adamw
        require_requested: true
        weight_decay: 0.0
        betas:
        - 0.9
        - 0.999
        min_lr: 0.0004
        muon_per_parameter_lr: false
      runtime:
        max_steps: 2500
        eval_every: 25
        checkpoint_every: 25
        trace_activations: false
      schedule:
        stages:
        - name: stage1
          steps: 2500
          lr_max: 0.004
          lr_schedule: linear
          warmup_ratio: 0.05
  parameter_adequacy_plan:
  - Compare directly against both the grouped-token replay anchor and the no-context row-embedding row.
  - Keep column-set and QASS disabled so plain-context value is separated from later row-first structure.
  run_id: null
  followup_run_ids: []
  decision: null
  interpretation_status: pending
  confounders: []
  next_action: Run second and interpret it directly against the no-context row-embedding control before moving to column-set.
  notes:
  - Execution must preserve the same full-budget replay payload as row 1 so only plain context changes.

- order: 3
  delta_ref: delta_column_set_plain_context_v2
  parent_delta_ref: delta_row_embeddings_plain_context_v2
  status: ready
  rationale: Evaluate TF-RD-006 only after the row-embedding and plain-context surface is established, so column-set evidence is not conflated with earlier row-first transitions.
  hypothesis: If explicit column-set reasoning belongs in the promoted row-first line, the public `column_set` stage should outperform row 2 on the same 2500-step replay contract.
  anchor_delta: Starting from row 2, add only the public `column_set` stage so TFCol is measured on the established plain-context row-embedding surface.
  model:
    stage: column_set
    stage_label: delta_column_set_plain_context_v2
  data:
    surface_label: anchor_manifest_default
  preprocessing:
    surface_label: runtime_default
  training:
    surface_label: prior_linear_warmup_decay
    prior_dump_non_finite_policy: skip
    overrides:
      apply_schedule: true
      optimizer:
        name: schedulefree_adamw
        require_requested: true
        weight_decay: 0.0
        betas:
        - 0.9
        - 0.999
        min_lr: 0.0004
        muon_per_parameter_lr: false
      runtime:
        max_steps: 2500
        eval_every: 25
        checkpoint_every: 25
        trace_activations: false
      schedule:
        stages:
        - name: stage1
          steps: 2500
          lr_max: 0.004
          lr_schedule: linear
          warmup_ratio: 0.05
  parameter_adequacy_plan:
  - Compare directly against the plain-context row-embedding row before reading any QASS result.
  - If neutral-to-bad, interpret whether the issue looks like under-capacity, inducing-point mismatch, or interaction with the unchanged plain context path.
  run_id: null
  followup_run_ids: []
  decision: null
  interpretation_status: pending
  confounders: []
  next_action: Run only after the plain-context row so TF-RD-006 stays attributable before QASS is introduced.
  notes:
  - This row is the matched non-QASS, plain-context control that TF-RD-007 should compare against after it completes.

- order: 4
  delta_ref: delta_qass_context_v2
  parent_delta_ref: delta_column_set_plain_context_v2
  status: ready
  rationale: Evaluate QASS last, and only against the matched plain-context `column_set` row, so TF-RD-007 answers whether QASS earns its added cost beyond the non-QASS row-first baseline.
  hypothesis: If QASS is genuinely useful on this row-first line, the public `qass_context` stage should beat row 3 on the same 2500-step replay contract rather than just adding depth without value.
  anchor_delta: Starting from row 3, switch only from plain context to the public `qass_context` stage so QASS is compared against a matched plain-context `column_set` control.
  model:
    stage: qass_context
    stage_label: delta_qass_context_v2
  data:
    surface_label: anchor_manifest_default
  preprocessing:
    surface_label: runtime_default
  training:
    surface_label: prior_linear_warmup_decay
    prior_dump_non_finite_policy: skip
    overrides:
      apply_schedule: true
      optimizer:
        name: schedulefree_adamw
        require_requested: true
        weight_decay: 0.0
        betas:
        - 0.9
        - 0.999
        min_lr: 0.0004
        muon_per_parameter_lr: false
      runtime:
        max_steps: 2500
        eval_every: 25
        checkpoint_every: 25
        trace_activations: false
      schedule:
        stages:
        - name: stage1
          steps: 2500
          lr_max: 0.004
          lr_schedule: linear
          warmup_ratio: 0.05
  parameter_adequacy_plan:
  - Compare directly against the matched plain-context `column_set` row.
  - Treat the plain-context `column_set` row as the non-QASS added-depth control for TF-RD-007.
  run_id: null
  followup_run_ids: []
  decision: null
  interpretation_status: pending
  confounders: []
  next_action: Run last and interpret only against the matched plain-context column-set row.
  notes:
  - Do not execute this row if the nanoTabPFN reuse preflight fails; fix the signature mismatch first instead of allowing a fresh helper run.
