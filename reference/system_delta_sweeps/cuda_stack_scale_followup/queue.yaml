        schedule:
          stages:
            - name: prior_dump
              steps: 1000
              lr_max: 0.004
              lr_schedule: linear
              warmup_ratio: 0.05
    parameter_adequacy_plan:
      - Compare directly against the matching RMSNorm row on the same short-screen surface.
      - Use the same upper-block-first winner rule so the combined row remains reproducible.
    execution_policy: screen_only
    run_id: null
    followup_run_ids: []
    decision: null
    interpretation_status: pending
    confounders: []
    next_action: Run after the RMSNorm short screen so the post-stack norm family comparison is available for a winner-take-forward decision.
    notes: []
  - order: 4
    delta_ref: dpnb_cuda_stack_scale_depth_scaled
    status: ready
    rationale: Test the root-cause intervention separately by reducing every prenorm residual branch before it is added back into the stack.
    hypothesis: Depth-scaled residual branches should lower the upper-block growth rate more effectively than a post-stack norm alone because they change the in-stack accumulation itself.
    anchor_delta: Keep the large-anchor batch32 replay screen fixed and add `model.module_overrides.table_block_residual_scale=depth_scaled`.
    model:
      stage: nano_exact
      stage_label: dpnb_cuda_stack_scale_depth_scaled
      d_col: 128
      d_icl: 512
      input_normalization: train_zscore_clip
      module_overrides:
        table_block_style: prenorm
        table_block_residual_scale: depth_scaled
        allow_test_self_attention: false
        row_pool: row_cls
      tfrow_n_heads: 8
      tfrow_n_layers: 3
      tfrow_cls_tokens: 2
      tfrow_norm: layernorm
      tficl_n_heads: 8
      tficl_n_layers: 12
      head_hidden_dim: 1024
    data:
      surface_label: anchor_manifest_default
    preprocessing:
      surface_label: runtime_default
    training:
      surface_label: prior_linear_warmup_decay
      prior_dump_non_finite_policy: skip
      prior_dump_batch_size: 32
      prior_dump_lr_scale_rule: none
      prior_dump_batch_reference_size: 32
      overrides:
        apply_schedule: true
        optimizer:
          min_lr: 0.0004
        runtime:
          grad_clip: 1.0
          max_steps: 1000
          trace_activations: true
        schedule:
          stages:
            - name: prior_dump
              steps: 1000
              lr_max: 0.004
              lr_schedule: linear
              warmup_ratio: 0.05
    parameter_adequacy_plan:
      - Compare directly against the control and post-stack norm rows on the same short-screen surface.
      - Use this row to decide whether the root-cause residual intervention deserves the one full-budget benchmark row.
    execution_policy: screen_only
    run_id: null
    followup_run_ids: []
    decision: null
    interpretation_status: pending
    confounders: []
    next_action: Run after the norm-family screens so the final full-budget row can combine depth scaling with the winning post-stack norm if needed.
    notes: []
  - order: 5
    delta_ref: dpnb_cuda_stack_scale_depth_scaled_plus_norm_winner
    status: ready
    rationale: Spend the full benchmark budget only once, after the short screens identify the better downstream norm to pair with depth-scaled residuals.
    hypothesis: Depth-scaled prenorm residuals plus the winning post-stack norm will produce the strongest stability evidence and the best chance of a benchmarkable large-anchor candidate.
    anchor_delta: Keep the large-anchor batch32 replay benchmark surface fixed, add `table_block_residual_scale=depth_scaled`, and resolve `post_stack_norm` dynamically from rows 2-3 with RMSNorm winning any unresolved tie.
    model:
      stage: nano_exact
      stage_label: dpnb_cuda_stack_scale_depth_scaled_plus_norm_winner
      d_col: 128
      d_icl: 512
      input_normalization: train_zscore_clip
      module_overrides:
        table_block_style: prenorm
        table_block_residual_scale: depth_scaled
        allow_test_self_attention: false
        row_pool: row_cls
      tfrow_n_heads: 8
      tfrow_n_layers: 3
      tfrow_cls_tokens: 2
      tfrow_norm: layernorm
      tficl_n_heads: 8
      tficl_n_layers: 12
      head_hidden_dim: 1024
    dynamic_model_overrides:
      post_stack_norm:
        kind: screen_winner
        compare_orders:
          - order: 2
            value: rmsnorm
          - order: 3
            value: layernorm
        tie_break_preference: rmsnorm
    data:
      surface_label: anchor_manifest_default
    preprocessing:
      surface_label: runtime_default
    training:
      surface_label: prior_linear_warmup_decay
      prior_dump_non_finite_policy: skip
      prior_dump_batch_size: 32
      prior_dump_lr_scale_rule: none
      prior_dump_batch_reference_size: 32
      overrides:
        apply_schedule: true
        optimizer:
          min_lr: 0.0004
        runtime:
          grad_clip: 1.0
          max_steps: 2500
          trace_activations: true
        schedule:
          stages:
            - name: prior_dump
              steps: 2500
              lr_max: 0.004
              lr_schedule: linear
              warmup_ratio: 0.05
    parameter_adequacy_plan:
      - Resolve the winning post-stack norm from rows 2-3 using upper-block final-window scale first, then post-warmup slope, then clip rate, then loss EMA, with RMSNorm as the final tie-breaker.
      - Benchmark only this combined row at full budget after the short-screen control and component rows complete.
    execution_policy: benchmark_full
    run_id: null
    followup_run_ids: []
    decision: null
    interpretation_status: pending
    confounders: []
    next_action: Wait for the short-screen norm comparison to resolve, then benchmark the combined depth-scaled row with the winning post-stack norm.
    notes:
      - The runner resolves `model.module_overrides.post_stack_norm` at execution time from the recorded screen metrics in rows 2-3.
