schema: tab-foundry-system-delta-sweep-queue-v1
sweep_id: qass_tfcol_large_no_missing_validation_v1
rows:
- order: 1
  delta_ref: delta_qass_no_column_v3
  status: ready
  rationale: Establish the no-TFCol QASS control on the larger no-missing bundle
    so the selected calibration-first TFCol row can be judged against a same-bundle
    row-first baseline.
  hypothesis: The larger no-missing bundle should keep the no-TFCol QASS line as
    a strong ROC-oriented baseline even if the calibration-first TFCol line remains
    preferable for log loss and Brier.
  anchor_delta: Re-run the completed `delta_qass_no_column_v3` architecture on the
    larger no-missing bundle to create the same-bundle control for the heads4 validation
    row.
  model:
    stage: qass_context
    stage_label: delta_qass_no_column_v3
    module_overrides:
      column_encoder: none
  data:
    surface_label: anchor_manifest_default
  preprocessing:
    surface_label: runtime_default
  training:
    surface_label: prior_linear_warmup_decay
    prior_dump_non_finite_policy: skip
    overrides:
      apply_schedule: true
      optimizer:
        name: schedulefree_adamw
        require_requested: true
        weight_decay: 0.0
        betas:
        - 0.9
        - 0.999
        min_lr: 0.0004
        muon_per_parameter_lr: false
      runtime:
        max_steps: 2500
        eval_every: 25
        checkpoint_every: 25
        trace_activations: false
      schedule:
        stages:
        - name: stage1
          steps: 2500
          lr_max: 0.004
          lr_schedule: linear
          warmup_ratio: 0.05
  parameter_adequacy_plan:
  - Use this row only as the same-bundle control for row 2 on the large no-missing
    validator.
  - Do not interpret this row by itself as a new attribution result; the decision
    comes from row 2 versus row 1 on this bundle.
  run_id: null
  followup_run_ids: []
  decision: null
  interpretation_status: pending
  confounders: []
  next_action: Run first and treat it as the same-bundle no-TFCol control before
    reading the heads4 validation row.
  notes:
  - This row exists to establish the large-bundle control; do not reopen medium-bundle
    attribution from it.
  - Execution must use the same control baseline, replay payload, and reuse signature
    as the matching heads4 row so bundle shift is the only external change.
- order: 2
  delta_ref: delta_qass_context_tfcol_heads4_v1
  parent_delta_ref: delta_qass_no_column_v3
  status: ready
  rationale: Validate whether the selected calibration-first `qass + tfcol_heads4`
    line still wins once task count and feature width expand on the larger no-missing
    bundle.
  hypothesis: If the medium-bundle `heads4` win is real rather than overfit to the
    small validator, row 2 should beat row 1 on both final log loss and final Brier
    while keeping the final ROC AUC gap within `-0.005`.
  anchor_delta: Starting from row 1 on the larger no-missing bundle, add TFCol back
    in at the selected `heads4` setting and compare the result only against the same-bundle
    no-TFCol QASS control.
  model:
    stage: qass_context
    stage_label: delta_qass_context_tfcol_heads4_v1
    tfcol_n_heads: 4
  data:
    surface_label: anchor_manifest_default
  preprocessing:
    surface_label: runtime_default
  training:
    surface_label: prior_linear_warmup_decay
    prior_dump_non_finite_policy: skip
    overrides:
      apply_schedule: true
      optimizer:
        name: schedulefree_adamw
        require_requested: true
        weight_decay: 0.0
        betas:
        - 0.9
        - 0.999
        min_lr: 0.0004
        muon_per_parameter_lr: false
      runtime:
        max_steps: 2500
        eval_every: 25
        checkpoint_every: 25
        trace_activations: false
      schedule:
        stages:
        - name: stage1
          steps: 2500
          lr_max: 0.004
          lr_schedule: linear
          warmup_ratio: 0.05
  parameter_adequacy_plan:
  - Read this row only against row 1 on the same large no-missing bundle using `vs_parent`.
  - Promote `row_cls + qass + tfcol_heads4` only if row 2 beats row 1 on final log
    loss and final Brier, and the final ROC AUC delta is no worse than `-0.005`.
  run_id: null
  followup_run_ids: []
  decision: null
  interpretation_status: pending
  confounders: []
  next_action: Run second and interpret only against row 1 on the same large no-missing
    bundle.
  notes:
  - Do not reopen `inducing64` or `layers1` unless this row is materially ambiguous
    on the large-bundle validator.
  - If this row passes, the next follow-up is a single missing-data generalization
    check on `src/tab_foundry/bench/nanotabpfn_openml_binary_large_v1.json`.
  - Execution must use the same control baseline, replay payload, and reuse signature
    as row 1 so the large-bundle heads4 comparison stays isolated.
