  model:
    stage_label: delta_shifted_grouped_tokenizer
    module_overrides:
      tokenizer: shifted_grouped
  data:
    surface_label: anchor_manifest_default
  preprocessing:
    surface_label: runtime_default
  parameter_adequacy_plan:
  - Do not run while tokenizer changes are bypassed by the active feature encoder.
  run_id: null
  followup_run_ids: []
  decision: null
  interpretation_status: blocked
  confounders:
  - The nano feature encoder ignores tokenizer outputs, so this row would execute
    the anchor path unchanged.
  next_action: Unblock only after the comparison surface makes tokenizer changes effective,
    or replace this row with a genuinely isolatable tokenization experiment.
  notes: []
- order: 6
  delta_id: delta_row_cls_pool
  status: ready
  dimension_family: model
  family: row_pool
  binary_applicable: true
  description: Replace target-column pooling with CLS-based row pooling while leaving
    tokenizer, column encoder, and context encoder otherwise anchored.
  rationale: This is the row you called out directly; the structure change is large
    enough that its introduced capacity knobs must be reported and interpreted, not
    hidden.
  hypothesis: CLS pooling may extract better row summaries, but a weak result is not
    evidence against the mechanism unless tfrow_n_heads, tfrow_n_layers, and tfrow_cls_tokens
    are adequate.
  upstream_delta: Upstream nanoTabPFN does not use row-level CLS pooling.
  anchor_delta: Changes only row_pool from target_column to row_cls.
  expected_effect: Richer row aggregation with substantial added capacity and masking
    sensitivity.
  adequacy_knobs:
  - tfrow_n_heads
  - tfrow_n_layers
  - tfrow_cls_tokens
  parameter_adequacy_policy:
    default_plan:
    - Initial run isolates the structural toggle only.
    - If neutral-to-bad, perform a bounded adequacy sweep over tfrow_n_heads, tfrow_n_layers,
      and tfrow_cls_tokens before any reject decision.
    - Document whether the row pool appears under-capacity, over-capacity, or simply
      incompatible with the anchor tokenizer.
    default_negative_decision: defer
    reject_requires:
    - isolated_change
    - adequacy_plan_complete
    - clearly_worse_without_offsetting_benefit
  applicability_guards: []
  model:
    stage_label: delta_row_cls_pool
    module_overrides:
      row_pool: row_cls
  data:
    surface_label: anchor_manifest_default
  preprocessing:
    surface_label: runtime_default
  parameter_adequacy_plan:
  - Initial run isolates the structural toggle only.
  - If neutral-to-bad, perform a bounded adequacy sweep over tfrow_n_heads, tfrow_n_layers,
    and tfrow_cls_tokens before any reject decision.
  - Document whether the row pool appears under-capacity, over-capacity, or simply
    incompatible with the anchor tokenizer.
  run_id: null
  followup_run_ids: []
  decision: null
  interpretation_status: pending
  confounders:
  - Row CLS pooling adds both a new aggregation rule and new capacity knobs.
  next_action: Run the isolated row-pool toggle and require interpretation before
    any verdict.
  notes: []
- order: 7
  delta_id: delta_column_set_encoder
  status: ready
  dimension_family: model
  family: column_encoding
  binary_applicable: true
  description: Add the TFCol/ISAB-style set encoder over columns while keeping row
    pooling and context encoding otherwise fixed.
  rationale: Column-set encoding should be evaluated separately from row CLS pooling
    and QASS context so its effect is attributable.
  hypothesis: Explicit column-set reasoning may help heterogeneous feature identity,
    but harm may indicate that tfcol_n_heads / tfcol_n_layers / tfcol_n_inducing are
    poorly chosen rather than that the idea is bad.
  upstream_delta: Upstream nanoTabPFN does not include a dedicated column-set encoder.
  anchor_delta: Changes only column_encoder from none to tfcol.
  expected_effect: Better feature-set aggregation with extra capacity and inducing-point
    sensitivity.
  adequacy_knobs:
  - tfcol_n_heads
  - tfcol_n_layers
  - tfcol_n_inducing
  parameter_adequacy_policy:
    default_plan:
    - If the first run underperforms, interpret whether the issue looks like under-capacity,
      inducing-point mismatch, or interaction with the unchanged row pool.
    default_negative_decision: defer
    reject_requires:
    - isolated_change
    - adequacy_plan_complete
    - clearly_worse_without_offsetting_benefit
  applicability_guards: []
  model:
    stage_label: delta_column_set_encoder
    module_overrides:
      column_encoder: tfcol
  data:
    surface_label: anchor_manifest_default
  preprocessing:
    surface_label: runtime_default
  parameter_adequacy_plan:
  - If the first run underperforms, interpret whether the issue looks like under-capacity,
    inducing-point mismatch, or interaction with the unchanged row pool.
  run_id: null
  followup_run_ids: []
  decision: null
  interpretation_status: pending
  confounders: []
  next_action: Run the isolated column-set encoder delta after the row-pool row is
    understood.
  notes: []
- order: 8
  delta_id: delta_qass_context
  status: ready
  dimension_family: model
  family: context_encoder
  binary_applicable: true
  description: Add the QASS-based sequence context encoder over row embeddings.
  rationale: Context encoding changes both depth and label-conditioned message passing,
    so it belongs late in the binary queue after simpler toggles.
  hypothesis: QASS may help longer-range support/test interactions, but weak results
    may simply indicate the compact benchmark surface does not justify the added context
    depth.
  upstream_delta: Upstream nanoTabPFN direct binary path has no separate context encoder.
  anchor_delta: Changes only context_encoder from none to qass.
  expected_effect: Richer row-sequence conditioning with risk of unnecessary depth
