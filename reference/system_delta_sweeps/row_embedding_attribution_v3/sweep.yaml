schema: tab-foundry-system-delta-sweep-v1
sweep_id: row_embedding_attribution_v3
parent_sweep_id: row_embedding_attribution_v2
status: draft
complexity_level: binary_md
anchor_run_id: sd_row_embedding_attribution_v2_01_delta_row_embeddings_no_context_v2_v1
benchmark_bundle_path: src/tab_foundry/bench/nanotabpfn_openml_binary_medium_v1.json
control_baseline_id: cls_benchmark_linear_v2
training_experiment: cls_benchmark_staged
training_config_profile: cls_benchmark_staged
surface_role: architecture_screen
comparison_policy: anchor_only
upstream_reference:
  name: nanoTabPFN
  model_source: https://github.com/automl/nanoTabPFN/blob/main/model.py
anchor_surface:
  notes:
  - The locked anchor is benchmark registry run `sd_row_embedding_attribution_v2_01_delta_row_embeddings_no_context_v2_v1`
    on bundle `nanotabpfn_openml_binary_medium` (10 tasks).
  - The anchor model surface is taken from the registry-resolved staged selection
    labeled `delta_row_embeddings_no_context_v2`.
  - Data and preprocessing remain part of the comparison surface and must stay fixed
    unless the queue row declares that exact dimension.
  - >-
    This v3 sweep completes the missing TFCol × QASS factorization on top of the
    v2 winning row-embedding surface instead of spending more budget on plain-context
    tuning.
  - >-
    Rows 1-2 compare directly against the v2 row-1 anchor, while row 3 compares
    against row 1 through `parent_delta_ref` so the incremental TFCol effect stays
    isolated once QASS is already present.
  - >-
    If row 1 wins and row 3 is flat or worse versus row 1, promote
    `row_cls + qass + no tfcol` as the next architecture line and demote default
    TFCol from the row-first path.
  - >-
    If row 3 materially beats row 1, treat TFCol as useful only in the presence
    of QASS and keep any later adequacy work on that combined surface.
  - >-
    Execution must reuse the anchor's compatible `nanoTabPFN` curve. If the reuse
    signature does not match, stop and fix the mismatch instead of letting the
    runner fall back to a fresh helper run.
  dimension_table:
  - dimension: feature encoder
    upstream: Scalar feature linear encoder with internal train/test z-score+clip
      handling.
    anchor: Shared feature encoder path with benchmark-external normalization.
    interpretation: Feature encoder swaps change both the representation path and
      where normalization lives.
  - dimension: target conditioning
    upstream: Mean-padded linear target encoder on the direct binary path.
    anchor: Label-token target conditioning.
    interpretation: Target-conditioning swaps change how labels enter the model and
      need their own attribution.
  - dimension: cell transformer block
    upstream: Post-norm nanoTabPFN block with feature attention then row attention.
    anchor: Pre-norm cell transformer block with test-self attention enabled.
    interpretation: Block-style changes alter attention flow and should not be conflated
      with tokenizer or readout deltas.
  - dimension: tokenizer
    upstream: One scalar token per feature.
    anchor: Shifted grouped tokenizer.
    interpretation: Tokenizer changes reshape the effective table sequence and need
      their own adequacy commentary.
  - dimension: column encoder
    upstream: None on the upstream direct path.
    anchor: No column-set encoder on the anchor path.
    interpretation: Column-set modeling remains absent and should not explain anchor
      behavior.
  - dimension: row readout
    upstream: Target-column readout from the final cell tensor.
    anchor: Row-CLS pooling path.
    interpretation: Row-pool changes alter how the table summary is extracted and
      should be isolated from context changes.
  - dimension: context encoder
    upstream: None on the upstream direct path.
    anchor: None on the anchor path.
    interpretation: Context encoding remains absent; later context rows will change
      both depth and label-flow semantics.
  - dimension: prediction head
    upstream: Direct binary logits head.
    anchor: Small-class direct head.
    interpretation: Head changes alter the task contract and should be interpreted
      separately from shared trunk changes.
  - dimension: training data surface
    upstream: OpenML notebook tasks only for benchmarking; no repo-local prior-training
      manifest contract.
    anchor: Benchmark bundle `nanotabpfn_openml_binary_medium` (10 tasks) with data
      surface label `anchor_manifest_default`.
    interpretation: Bundle and training-data changes are first-class sweep rows and
      should not be inherited from parent sweep prose.
  - dimension: preprocessing
    upstream: Notebook preprocessing inside the benchmark helper.
    anchor: Benchmark preprocessing surface label `runtime_default`.
    interpretation: Preprocessing changes can alter the effective task definition
      and must be tracked explicitly.
  - dimension: training recipe
    upstream: No repo-local prior-dump training-surface contract.
    anchor: Training surface label `prior_linear_warmup_decay`.
    interpretation: Optimizer and schedule changes are first-class sweep rows, not
      background recipe assumptions.
anchor_context:
  run_id: sd_row_embedding_attribution_v2_01_delta_row_embeddings_no_context_v2_v1
  experiment: cls_benchmark_staged
