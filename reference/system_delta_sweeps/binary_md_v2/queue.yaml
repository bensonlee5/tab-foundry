schema: tab-foundry-system-delta-sweep-queue-v1
sweep_id: binary_md_v2
rows:
- order: 1
  delta_ref: delta_anchor_activation_trace_baseline
  status: completed
  rationale: Establish a traced anchor baseline before rerunning the shared-encoder
    rows so activation-scale shifts can be interpreted against the unchanged model
    surface.
  hypothesis: Activation tracing should be additive only; the traced anchor rerun
    is expected to preserve anchor-quality behavior while revealing the forward-pass
    norm profile entering and traversing the transformer.
  anchor_delta: Keeps the anchor model, data, and preprocessing surfaces fixed and
    changes only the training recipe by enabling activation tracing.
  model:
    stage_label: delta_anchor_activation_trace_baseline
  data:
    surface_label: anchor_manifest_default
  preprocessing:
    surface_label: runtime_default
  training:
    surface_label: prior_constant_lr_trace_activations
    overrides:
      runtime:
        trace_activations: true
  parameter_adequacy_plan:
  - Confirm the traced run preserves the anchor model, data, and preprocessing surfaces.
  - Use the emitted activation norms as the baseline comparator for all later stabilization
    rows.
  run_id: litf5n0i
  followup_run_ids: []
  decision: Anchor trace baseline established. Best ROC AUC 0.7596 (step 2275). Activation
    norms captured in gradient_history. NanoTabPFN best 0.7616.
  interpretation_status: completed
  confounders: []
  next_action: null
  notes:
  - 'wandb: https://wandb.ai/bensonlee55-none/tab-foundry/runs/litf5n0i'
  - final_train_loss=0.452, mean_grad_norm=0.177, max_grad_norm=4.658
- order: 2
  delta_ref: delta_shared_feature_norm
  status: completed
  rationale: Reproduce the shared-feature-encoder row with activation tracing enabled
    so the late-curve retention gap can be separated from purely structural explanations.
  hypothesis: Shared feature encoding may still peak above the anchor, but the traced
    rerun should show whether unstable pre-transformer or per-block activation scales
    accompany the weaker final checkpoint.
  anchor_delta: Changes feature_encoder from nano to shared and enables activation
    tracing while keeping tokenizer, target conditioning, table block, row pooling,
    data, and preprocessing fixed.
  model:
    stage_label: delta_shared_feature_norm
    module_overrides:
      feature_encoder: shared
  data:
    surface_label: anchor_manifest_default
  preprocessing:
    surface_label: runtime_default
  training:
    surface_label: prior_constant_lr_trace_activations
    overrides:
      runtime:
        trace_activations: true
  parameter_adequacy_plan:
  - Keep optimizer and row/context structure fixed for the first pass.
  - Only treat a weak result as structural evidence after checking whether normalization
    mismatch is the dominant failure mode.
  run_id: 6h20zft8
  followup_run_ids: []
  decision: Shared feature encoder (no post-norm) best ROC AUC 0.7620 (step 1950),
    slightly above anchor 0.7596. Activation norms captured. NanoTabPFN best 0.7616.
  interpretation_status: completed
  confounders: []
  next_action: null
  notes:
  - 'wandb: https://wandb.ai/bensonlee55-none/tab-foundry/runs/6h20zft8'
  - final_train_loss=0.450, mean_grad_norm=0.175, max_grad_norm=4.660
- order: 3
  delta_ref: delta_shared_feature_norm_with_post_layernorm
  status: completed
  rationale: Test whether explicit LayerNorm after the shared feature encoder stabilizes
    the cell table before it enters the transformer.
  hypothesis: Post-encoder LayerNorm should reduce activation-scale drift across
    transformer blocks and improve final retention relative to the traced shared
    baseline.
  anchor_delta: Changes feature_encoder from nano to shared, adds post_encoder_norm=layernorm,
    and enables activation tracing while keeping the rest of the anchor surface fixed.
  model:
    stage_label: delta_shared_norm_post_ln
    module_overrides:
      feature_encoder: shared
      post_encoder_norm: layernorm
  data:
    surface_label: anchor_manifest_default
  preprocessing:
    surface_label: runtime_default
  training:
    surface_label: prior_constant_lr_trace_activations
    overrides:
      runtime:
        trace_activations: true
  parameter_adequacy_plan:
  - Compare the traced shared baseline and this row jointly before drawing conclusions
    about structural encoder quality.
  - If the row is mixed, inspect whether activation-scale stabilization improves drift
    even when final ROC AUC is neutral.
  run_id: fedytzgt
  followup_run_ids: []
  decision: LayerNorm post-encoder achieved BEST sweep ROC AUC 0.7670 (step 2075),
    exceeding both anchor (0.7596) and shared-no-norm (0.7620). Hypothesis confirmed -
    LayerNorm stabilizes post-encoder activations. max_grad_norm reduced to 4.208 vs
    anchor 4.658.
  interpretation_status: completed
  confounders: []
  next_action: null
  notes:
  - 'wandb: https://wandb.ai/bensonlee55-none/tab-foundry/runs/fedytzgt'
  - final_train_loss=0.452, mean_grad_norm=0.182, max_grad_norm=4.208
- order: 4
  delta_ref: delta_shared_feature_norm_with_post_rmsnorm
  status: completed
  rationale: Compare RMSNorm against LayerNorm as the explicit post-encoder stabilization
    stage on the shared feature path.
  hypothesis: RMSNorm may preserve more of the shared encoder scale structure than
    LayerNorm while still preventing the activation growth that hurt late-curve retention.
  anchor_delta: Changes feature_encoder from nano to shared, adds post_encoder_norm=rmsnorm,
    and enables activation tracing while keeping the rest of the anchor surface fixed.
  model:
    stage_label: delta_shared_norm_post_rms
    module_overrides:
      feature_encoder: shared
      post_encoder_norm: rmsnorm
  data:
    surface_label: anchor_manifest_default
  preprocessing:
    surface_label: runtime_default
  training:
    surface_label: prior_constant_lr_trace_activations
    overrides:
      runtime:
        trace_activations: true
  parameter_adequacy_plan:
  - Compare activation traces and final ROC AUC jointly against the traced shared
    baseline.
  - Use the result to separate normalization-family effects from the shared feature
    encoder itself.
  run_id: r684s86u
  followup_run_ids: []
  decision: RMSNorm post-encoder best ROC AUC 0.7572 (step 1975), below both anchor
    (0.7596) and LayerNorm (0.7670). RMSNorm did not improve over shared-no-norm
    (0.7620). max_grad_norm 4.216 similar to LayerNorm. LayerNorm is the clear winner.
  interpretation_status: completed
  confounders: []
  next_action: null
  notes:
  - 'wandb: https://wandb.ai/bensonlee55-none/tab-foundry/runs/r684s86u'
  - final_train_loss=0.454, mean_grad_norm=0.182, max_grad_norm=4.216
