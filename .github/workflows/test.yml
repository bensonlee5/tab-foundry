name: test

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-and-unit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-py314-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-py314-uv-

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Fetch main for version audit
        if: github.event_name == 'pull_request'
        run: git fetch --no-tags --depth=1 origin main:refs/remotes/origin/main

      - name: Version bump guard
        if: github.event_name == 'pull_request'
        run: uv run python scripts/audit/check_version_bump.py --base-ref origin/main

      - name: Quality and unit verification
        run: ./scripts/dev verify full

  iris-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-py314-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-py314-uv-

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Run iris smoke
        run: ./scripts/dev smoke iris --out-root benchmarks/results/ci_iris_smoke

      - name: Upload iris smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iris-smoke
          path: benchmarks/results/ci_iris_smoke
          if-no-files-found: warn

      - name: Publish iris smoke summary
        if: always()
        run: |
          if [ -f benchmarks/results/ci_iris_smoke/summary.md ]; then
            cat benchmarks/results/ci_iris_smoke/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "summary.md was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi
