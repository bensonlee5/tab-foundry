schema: tab-foundry-system-delta-sweep-queue-v1
sweep_id: grouped_token_stability_probe_v1
rows:
- order: 1
  delta_ref: delta_anchor_activation_trace_baseline
  status: completed
  rationale: Establish a traced grouped-token baseline before trying schedule changes
    so activation windows and benchmark retention can be interpreted against the unchanged
    grouped-token surface.
  hypothesis: Activation tracing should be additive only; if the mixed grouped-token
    benchmark read was mainly a training-adequacy issue, this traced rerun should
    stay close to the architecture-screen result while exposing whether the longer
    grouped-token lane keeps stage-local norms bounded.
  anchor_delta: Keep the grouped-token model, data, and preprocessing surfaces fixed
    and change only the training recipe by enabling activation tracing on the grouped-token
    anchor surface.
  model:
    stage: grouped_tokens
    stage_label: delta_architecture_screen_grouped_tokens
    module_overrides:
      allow_test_self_attention: true
      column_encoder: none
      context_encoder: none
      feature_encoder: shared
      head: small_class
      post_encoder_norm: none
      post_stack_norm: none
      row_pool: target_column
      table_block_residual_scale: none
      table_block_style: prenorm
      target_conditioner: label_token
      tokenizer: shifted_grouped
  data:
    surface_label: anchor_manifest_default
  preprocessing:
    surface_label: runtime_default
  training:
    surface_label: prior_constant_lr_trace_activations
    overrides:
      runtime:
        trace_activations: true
  parameter_adequacy_plan:
  - Confirm the traced run preserves the anchor model, data, and preprocessing surfaces.
  - Use the emitted activation norms as the baseline comparator for all later stabilization
    rows.
  run_id: sd_grouped_token_stability_probe_v1_01_delta_anchor_activation_trace_baseline_v1
  followup_run_ids: []
  decision: defer
  interpretation_status: completed
  confounders: []
  next_action: Use this traced row as the telemetry anchor only; the benchmark-facing
    grouped-token replay should follow the row-3 no-trace warmup-decay surface rather
    than this traced run.
  notes:
  - Canonical rerun registered as `sd_grouped_token_stability_probe_v1_01_delta_anchor_activation_trace_baseline_v1`.
  - Canonical benchmark comparison recorded against the locked sweep anchor; interpret
    this row in the full sweep context.
  - "The traced grouped-token anchor recovered the mixed architecture-screen result: final log loss `0.4002`, final Brier `0.2618`, final ROC AUC `0.7411`, clipped-step fraction `0.0012`, and zero drift."
  - "Treat this row as the activation/telemetry reference, not as the preferred default execution surface, because row 3 reproduces the same quality without trace overhead."
