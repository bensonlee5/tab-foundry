    surface, the no-context `row_cls_pool` control should outperform the grouped-token
    anchor strongly enough to keep TF-RD-005 open even before plain context is enabled.
  anchor_delta: Starting from the grouped-token replay anchor, switch to the public
    `row_cls_pool` stage but override `context_encoder=none` so row embeddings are
    measured without added context depth.
