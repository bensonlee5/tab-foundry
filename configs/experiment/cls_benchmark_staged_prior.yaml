# @package _global_

task: classification
model:
  arch: tabfoundry_staged
  stage: nano_exact
  d_icl: 96
  input_normalization: train_zscore_clip
  many_class_base: 2
  tficl_n_heads: 4
  tficl_n_layers: 3
  head_hidden_dim: 192
runtime:
  output_dir: outputs/cls_benchmark_staged_prior
  device: auto
  mixed_precision: "no"
  num_workers: 0
  grad_clip: 1.0
  grad_accum_steps: 1
  eval_every: 25
  checkpoint_every: 25
  val_batches: 0
  max_steps: 2500
optimizer:
  name: schedulefree_adamw
  require_requested: true
  weight_decay: 0.0
  betas: [0.9, 0.95]
  min_lr: 4.0e-3
  muon_per_parameter_lr: false
  muon_lr_scale_base: 0.2
  muon_partition_non2d: true
logging:
  run_name: cls-benchmark-staged-prior
  history_jsonl_path: ${runtime.output_dir}/train_history.jsonl
