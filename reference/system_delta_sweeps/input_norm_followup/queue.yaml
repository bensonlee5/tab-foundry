schema: tab-foundry-system-delta-sweep-queue-v1
sweep_id: input_norm_followup
rows:
- order: 1
  delta_ref: dpnb_input_norm_anchor_replay
  status: ready
  rationale: >-
    Reproduce the promoted bridge baseline locally before interpreting any normalization or batch-size movement.
  hypothesis: >-
    The row-cls bridge winner should replay cleanly on this machine and provide the correct comparator for the rest of the queue.
  anchor_delta: >-
    Replays `dpnb_row_cls_cls2_linear_warmup_decay` exactly, keeping `train_zscore_clip`,
    batch size 32, and the promoted linear-warmup-decay schedule.
  parameter_adequacy_plan:
  - Run this row first and use it as the same-machine comparator for every later row.
  - Report benchmark ROC, best-to-final drift, clipped-step fraction, and activation windows.
  - Do not treat this replay as canonical anchor registration; the remote winning artifacts are still unsynced locally.
  model:
    stage: nano_exact
    stage_label: dpnb_row_cls_cls2_linear_warmup_decay
    input_normalization: train_zscore_clip
    module_overrides:
      table_block_style: prenorm
      allow_test_self_attention: false
      row_pool: row_cls
    tfrow_n_heads: 8
    tfrow_n_layers: 3
    tfrow_cls_tokens: 2
    tfrow_norm: layernorm
  data:
    surface_label: anchor_manifest_default
  preprocessing:
    surface_label: runtime_default
  training:
    surface_label: prior_linear_warmup_decay
    prior_dump_non_finite_policy: skip
    prior_dump_batch_size: 32
    prior_dump_lr_scale_rule: none
    prior_dump_batch_reference_size: 32
    overrides:
      apply_schedule: true
      optimizer:
        min_lr: 0.0004
      runtime:
        grad_clip: 1.0
        max_steps: 2500
        trace_activations: true
      schedule:
        stages:
        - name: prior_dump
          steps: 2500
          lr_max: 0.004
          lr_schedule: linear
          warmup_ratio: 0.05
  run_id: null
  followup_run_ids: []
  decision: null
  interpretation_status: pending
  confounders: []
  next_action: >-
    Run first and keep as the local comparator for rows 2-9.
  notes:
  - This row is required because the promoted bridge baseline artifacts were produced on another machine.

