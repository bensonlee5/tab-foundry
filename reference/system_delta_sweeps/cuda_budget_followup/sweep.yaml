anchor_surface:
  notes:
    - This follow-up is scaffolded now but remains blocked until `cuda_capacity_pilot` identifies the winning architecture.
    - It temporarily reuses the promoted batch64 sqrt-scaled clipped bridge anchor from `input_norm_followup` so the sweep metadata can be rendered and tested immediately.
    - Before any run is launched here, replace the provisional large-anchor model surface with the winning capacity row from `cuda_capacity_pilot`.
    - This sweep answers training-budget adequacy only; it is not architecture-promotion evidence.
  dimension_table:
    - dimension: bridge architecture
      upstream: The capacity pilot will choose between the large anchor, width, and depth probes.
      anchor: Use the provisional large-anchor model surface for now, then re-anchor this sweep to the winning capacity row before execution.
      interpretation: Architecture choice must be settled before any budget result is interpreted.
    - dimension: training budget
      upstream: The capacity pilot fixes `2500` steps across all rows.
      anchor: This follow-up isolates `5000` and `10000` steps with the same optimizer and schedule family.
      interpretation: Budget wins indicate undertraining of the chosen architecture, not a new architecture family.
    - dimension: input normalization
      upstream: The completed normalization follow-up promoted the clipped batch64 row, and the no-normalization follow-up underperformed on that same systems surface.
      anchor: Keep `train_zscore_clip` fixed until new evidence reopens preprocessing.
      interpretation: Budget rows must not be conflated with preprocessing experiments.
